<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMRW Comms Portal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8f7f4;--card:#fff;--border:#e8e5df;--text:#1a1a1a;--sub:#8a8578;--accent:#c45d3e;--accent-light:#fef0ec;--green:#2d6a4f;--green-light:#ecfdf5;--blue:#1e40af;--blue-light:#eff6ff;--amber:#92400e;--amber-light:#fefce8;--red:#991b1b;--red-light:#fef2f2;--purple:#4338ca;--purple-light:#f5f3ff}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.gate{position:fixed;inset:0;background:#1a1a1a;display:flex;align-items:center;justify-content:center;z-index:9999}
.gate-box{text-align:center;width:300px}
.gate-box h1{font-family:'DM Serif Display',serif;font-size:28px;color:#fff;margin-bottom:4px}
.gate-box p{font-size:11px;color:#666;margin-bottom:28px;letter-spacing:1px;text-transform:uppercase}
.gate-box input{width:100%;padding:14px 18px;border-radius:10px;border:1px solid #333;background:#222;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;margin-bottom:12px;text-align:center;letter-spacing:1px}
.gate-box input::placeholder{color:#555}
.gate-box input:focus{border-color:var(--accent)}
.gate-box button{width:100%;padding:14px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.5px}
.gate-box button:hover{opacity:.9}
.gate-err{color:var(--accent);font-size:11px;margin-top:8px;display:none}
.hidden{display:none!important}
header{background:#1a1a1a;padding:0 24px;display:flex;align-items:center;height:52px;position:sticky;top:0;z-index:100}
header h1{font-family:'DM Serif Display',serif;font-size:16px;color:#fff;margin-right:32px}
.tabs{display:flex;gap:2px}
.tabs a{padding:8px 16px;font-size:12px;font-weight:600;color:#777;cursor:pointer;border-radius:8px 8px 0 0;transition:all .15s;letter-spacing:.3px}
.tabs a:hover{color:#ccc}
.tabs a.act{color:#fff;background:rgba(255,255,255,.08)}
.wrap{max-width:900px;margin:0 auto;padding:24px 20px}
.flow-group{margin-bottom:28px}
.flow-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.flow-hdr h2{font-family:'DM Serif Display',serif;font-size:18px;color:var(--text);flex:1}
.flow-hdr .cnt{font-size:11px;color:var(--sub);background:var(--bg);padding:3px 10px;border-radius:20px;font-weight:600}
.email{background:var(--card);border-radius:12px;border:1px solid var(--border);margin-bottom:6px;overflow:hidden;transition:border-color .15s}
.email:hover{border-color:#ccc}
.email-top{padding:14px 18px;cursor:pointer;display:flex;align-items:center;gap:12px;user-select:none}
.email-top .eid{font-family:monospace;font-size:10px;color:var(--sub);min-width:42px}
.email-top .etitle{font-size:13px;font-weight:600;flex:1}
.email-top .ech{font-size:10px;color:var(--sub);background:var(--bg);padding:2px 8px;border-radius:4px}
.email-top .estatus{font-size:10px;font-weight:700;padding:3px 10px;border-radius:6px}
.s-approved{background:var(--green-light);color:var(--green)}
.s-live{background:var(--blue-light);color:var(--blue)}
.s-todo{background:var(--purple-light);color:var(--purple)}
.s-review{background:var(--amber-light);color:var(--amber)}
.s-blocked{background:var(--red-light);color:var(--red)}
.s-cut{background:#f1f1f1;color:#999}
.chv{font-size:9px;color:var(--sub);transition:transform .2s;display:inline-block}
.chv.open{transform:rotate(90deg)}
.email-body{padding:0 18px 18px;border-top:1px solid #f5f3ef}
.meta-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:14px 0}
.meta-label{font-size:9px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.meta-val{font-size:13px;color:var(--text)}
.copy-box{background:#fafaf8;border-radius:10px;padding:16px 20px;border:1px solid #f0ede8;margin-bottom:10px}
.copy-label{font-size:9px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.copy-text{font-size:13px;color:var(--text);line-height:1.75;white-space:pre-wrap}
.sms-box{background:var(--amber-light);border-radius:10px;padding:12px 16px;border:1px solid #fef3c7;margin-bottom:10px}
.sms-label{font-size:9px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.sms-text{font-size:12px;color:#78350f;line-height:1.6}
.comment-box{background:var(--accent-light);border-radius:10px;padding:12px 16px;border:1px solid #fcd5c9;margin-top:10px}
.comment-label{font-size:9px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.comment-text{font-size:12px;color:#7c2d12;line-height:1.5}
.add-comment{font-size:11px;padding:6px 14px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--sub);cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:10px;transition:all .15s}
.add-comment:hover{border-color:var(--accent);color:var(--accent)}
textarea.ci{width:100%;padding:10px 14px;border:1px solid #fcd5c9;border-radius:10px;font-size:12px;font-family:'DM Sans',sans-serif;min-height:70px;resize:vertical;outline:none;background:#fffcfa;margin-top:10px}
textarea.ci:focus{border-color:var(--accent)}
.br{display:flex;gap:6px;margin-top:8px}
.bt{font-size:11px;padding:6px 14px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;border:none}
.bt-s{background:#1a1a1a;color:#fff}
.bt-d{background:var(--red-light);color:var(--red);border:1px solid #fecaca}
.bt-c{background:var(--card);color:var(--sub);border:1px solid var(--border)}
.summary-bar{display:flex;gap:16px;margin-bottom:20px;padding:16px 20px;background:var(--card);border-radius:12px;border:1px solid var(--border);flex-wrap:wrap}
.si{text-align:center;min-width:70px}
.si .sn{font-size:22px;font-weight:700;font-family:'DM Serif Display',serif}
.si .sl{font-size:9px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-top:2px}
.filters{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.fb{padding:6px 14px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--sub);font-family:'DM Sans',sans-serif;transition:all .15s}
.fb:hover{border-color:#ccc}
.fb.act{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.ss{margin-bottom:20px}
.ss h3{font-family:'DM Serif Display',serif;font-size:16px;margin-bottom:10px}
.sr{display:grid;grid-template-columns:50px 1fr 90px 100px 36px;gap:8px;align-items:center;padding:10px 14px;border-radius:8px;font-size:12px;border:1px solid transparent}
.sr:hover{background:var(--card);border-color:var(--border)}
.sr .sid{font-family:monospace;font-size:10px;color:var(--sub)}
.sr .st{font-weight:500}
.ssel{font-family:'DM Sans',sans-serif;font-size:11px;padding:5px 8px;border:1px solid var(--border);border-radius:6px;background:var(--card);cursor:pointer;outline:none;color:var(--text)}
.ssel:focus{border-color:var(--accent)}
.ssel.ch{border-color:var(--green);background:var(--green-light);color:var(--green)}
.nb{font-size:14px;cursor:pointer;color:var(--sub);text-align:center;border:none;background:none}
.nb:hover{color:var(--accent)}
@media(max-width:700px){.meta-row{grid-template-columns:1fr}.sr{grid-template-columns:40px 1fr 70px 80px 30px;font-size:11px}}
</style>
</head>
<body>
<div class="gate" id="gate">
<div class="gate-box">
<h1>TMRW</h1>
<p>Comms Portal</p>
<input type="password" id="pwIn" placeholder="Password" autocomplete="off" autofocus>
<button onclick="auth()">Enter</button>
<div class="gate-err" id="pwErr">Incorrect password</div>
</div>
</div>
<div id="app" class="hidden">
<header>
<h1>TMRW</h1>
<div class="tabs" id="tabs"></div>
</header>
<div class="wrap" id="content"></div>
</div>
<script>
function auth(){if(document.getElementById('pwIn').value==='startmytomorrow'){document.getElementById('gate').style.display='none';document.getElementById('app').classList.remove('hidden');sessionStorage.setItem('ta','1');render();}else{document.getElementById('pwErr').style.display='block';document.getElementById('pwIn').value='';}}
document.getElementById('pwIn').addEventListener('keydown',e=>{if(e.key==='Enter')auth();});
if(sessionStorage.getItem('ta')==='1'){document.getElementById('gate').style.display='none';document.getElementById('app').classList.remove('hidden');}

let tab='emails',openEmails={},editingComment=null,editingNote=null,statusFilter='all';
let comments=JSON.parse(localStorage.getItem('tmrw-comments')||'{}');
let statuses=JSON.parse(localStorage.getItem('tmrw-statuses')||'{}');
let statusNotes=JSON.parse(localStorage.getItem('tmrw-status-notes')||'{}');

  const flows=[
    {name:"Waitlist & Pre-Registration (8 emails)",tag:"tegan",emails:[
      {id:"0.1",t:"Waitlist Signup Confirmation",sub:"You're on the list. Here's what that means.",from:"Mark Britt, CEO",ch:"Email + SMS",body:"You're on the TMRW waitlist, and I wanted to say thanks personally for putting your hand up.\n\nWe keep our early member group intentionally small so every person gets the clinical depth and attention this process deserves. That's not a process you rush, and it's not one that works at scale.\n\nWhen your spot opens, here's what you're stepping into: a complete map of your biology, up to 1,700+ data points, a personalised plan built by your clinical team, and supplements that start working from your first week and get more precise as your data deepens. Then we retest four times a year, so the findings build on each other over time.\n\nWhen a spot opens, you'll hear from us directly. You'll have 48 hours to confirm, and from there your journey starts.\n\nWhile you wait, if something brought you here that you want to talk through, hit reply. I read these.\n\nHere's to more good tomorrows, strung together.\n\nMark Britt\nCEO, TMRW",sms:"Hi, you're officially on the TMRW waitlist. When your spot opens, you'll be the first to know. Good things coming."},
      {id:"0.2",t:"Nurture: What TMRW Actually Does",sub:"Most people wait. You didn't.",from:"Mark Britt, CEO",ch:"Email",body:"The health system was built to react. You feel something, you book an appointment, someone investigates. That's the model, and for most people, it's the only model they've ever known.\n\nIt means most people's relationship with their own health is defined by whatever has gone wrong recently, or loudly enough to demand attention. Not by understanding. Not by where things are heading.\n\nYou put your hand up before that happened. That's not a small thing.\n\nWhat you're waiting for isn't a test. It's a different starting point, one that begins with understanding what's going on in your biology before something forces the conversation. The goal isn't to find problems. It's to understand your body well enough that fewer things become problems at all.\n\nThat's what TMRW was built for. And it's what your spot is waiting to give you.\n\nMark Britt\nCEO, TMRW"},
      {id:"0.3",t:"Nurture: Proof It Works",sub:"TBD",from:"The TMRW Team",ch:"Email",body:"[IN REVIEW \u2014 PENDING STORY]\n\nAwaiting a confirmed member story from the wider team. A specific finding with a specific outcome is required. Brief is ready. Copy to follow once story is confirmed."},
      {id:"0.4",t:"Your Spot Is Coming",sub:"Your spot opens in five days.",from:"The TMRW Team",ch:"Email + SMS",body:"Something is about to change.\n\nYour TMRW spot opens on {{date}}.\n\nWhen you joined the waitlist, you made a decision most people never get around to. That's worth remembering as the moment gets closer.\n\nYour invitation will arrive on {{date}}. When it does, everything you've been waiting for starts from there.\n\nThe TMRW Team",sms:"Something is about to change. Your TMRW spot opens on {{date}}. Keep an eye on your inbox, your invitation lands that day."},
      {id:"0.5",t:"Your Spot Is Ready",sub:"Your spot is ready.",from:"The TMRW Team",ch:"Email + SMS",body:"Your spot is ready. This is your invitation to join TMRW.\n\nWhen you register, your at-home epigenetic testing kit ships within 48 hours. Your first step from there is your Health Story. It's how your clinical team gets to know you, and it's what sets everything in motion.\n\nOnce your Health Story is complete, your clinical team starts building your picture: your biology, your history, what's actually going on. Your first Customised Pod formula is created and shipped to you within days. As your blood and epigenetic results come in, your formula upgrades automatically. You retest 4 times a year, and it keeps getting more precise.\n\nUse code {{code}} to register. Your spot is held for 48 hours.\n\nYou're helping us build something worth building. We're glad you're in.\n\n[CLAIM YOUR SPOT]\n\nIf anything isn't clear before you register, reply here.\n\nThe TMRW Team",sms:"Your TMRW spot is ready. Use code {{code}} to register. Your spot is held for 48 hours. {{link}}"},
      {id:"0.6",t:"Your Spot Expires Tomorrow",sub:"Your spot expires tomorrow.",from:"The TMRW Team",ch:"Email + SMS",body:"Your TMRW spot expires tomorrow. After that it goes to the next person on the waitlist and we can't hold it further.\n\nYou waited for this spot. Whatever brought you to TMRW in the first place is still true today.\n\nIf something is holding you back, get in touch before your window closes. If life just got in the way, now is the moment.\n\nUse code {{code}} to register before your spot closes.\n\n[CLAIM YOUR SPOT NOW]\n\nThe TMRW Team",sms:"Your TMRW spot expires tomorrow. Use code {{code}} to register before it closes. {{link}}"},
      {id:"0.7",t:"One Question Before You Go",sub:"Did we get the timing wrong?",from:"The TMRW Team",ch:"Email + SMS",body:"Unfortunately, your TMRW spot has closed, and we won't pretend otherwise.\n\nWe should have another one open up later in the month, and we'll be back in touch when it does. But in the meantime, we wanted to ask one thing.\n\nWas it timing? Something you weren't sure about? Or has life just been a lot lately?\n\nIf any of those are true, reply here and let us know. We'll find a way to get you in when you're ready.\n\nThe TMRW Team",sms:"Your TMRW spot closed but we'd love to know why. If the timing wasn't right or something held you back, get in touch at info@startmytomorrow.com"},
      {id:"0.8",t:"Reengagement (Lapsed Waitlist)",sub:"We owe you an update.",from:"Mark Britt, CEO",ch:"Email + SMS",body:"You joined the TMRW waitlist a few months ago, and we haven't been in touch since. That's on us, and I wanted to change that.\n\nWe've been building carefully. Keeping the member group small so every person gets the clinical depth this process deserves. Your place on the list has been held throughout.\n\nYour spot is getting closer. When it opens, you'll hear from us with everything you need to get started.\n\nWhat you're stepping into when that arrives: a complete map of your biology across 1,700+ data points, a personalised plan built by a real doctor and health coach, and supplements compounded specifically to what your results show. Then a retest every four months, so the findings build on each other over time.\n\nIf anything has changed since you signed up, or you have questions before your invitation arrives, reply here. I read these.\n\nHere's to more good tomorrows, strung together.\n\nMark Britt\nCEO, TMRW",sms:"Hey, it's TMRW. You're still on the waitlist and your place has been held. We'll be in touch when your spot opens. Good things are coming."},
    ]},
    {name:"Registration & Checkout (10 emails)",tag:"tegan",emails:[
      {id:"1.1",t:"Welcome Email",sub:"Your TMRW membership is active",from:"The TMRW Team",ch:"Email + SMS",body:"Hey {{customer.first_name}},\n\nYou're in. Your TMRW membership is active.\n\nYour Little Prick Test will ship within 48 business hours, and you'll get tracking the moment it does.\n\nThe first thing to do from your side is your Health Story. It's where you tell us the things your biology can't: your background, your concerns, what you're hoping to get out of this. It's also what sets everything in motion. Nothing starts until it's done, and everything starts once it is.\n\nYour blood test requisition gets prepared. Your first Customised Pod formula gets created and shipped to you within days, 30 clinically selected ingredients based on your profile. And as your blood and epigenetic results come in, your formula gets more precise.\n\nAll of that begins with your Health Story.\n\n[START MY HEALTH STORY]\n\nWhen your Little Prick Test arrives, you'll find everything you need to collect your sample inside, along with a prepaid return envelope.\n\nYour TMRW Team",sms:"Hey, it's TMRW. Your membership is active. Your first step is your Health Story, it's what sets everything in motion: {{Health Story Link}}"},
      {id:"1.1A",t:"Mark CEO Welcome (+4h)",sub:"A quick note from Mark",from:"Mark Britt, CEO",ch:"Email",body:"Hey {{customer.first_name}},\n\nI wanted to say thank you, personally.\n\nTMRW Health exists because we believe people deserve real clarity about their bodies and the tools to actually do something with it. You clearly feel the same way, or you wouldn't be here.\n\nBehind the scenes, our clinical team talks about members every day. We pay attention to what's working, what's not, and how to make this sharper over time. You're part of that now.\n\nIf something specific brought you here, a goal, a question, something you've been putting off, hit reply and let us know. It helps your clinical team understand what matters to you.\n\nMark Britt\nCEO, TMRW Health"},
      {id:"1.3",t:"Cart Abandon Step 1 (+1h)",sub:"You didn't finish",from:"The TMRW Team",ch:"Email",body:"Hey {{customer.first_name}},\n\nYou started registering with TMRW but didn't finish. Your spot is still open.\n\nWhen you complete your registration, your at-home testing kit ships within 48 hours and your clinical team starts assembling. Once you complete your Health Story, your first Customised Pod formula gets created and shipped to you within days, and it only gets more precise from there as your results come in.\n\n[COMPLETE MY REGISTRATION]\n\nIf something got in the way, or you had a question you couldn't find the answer to, hit reply.\n\nYour TMRW Team"},
      {id:"1.4",t:"Cart Abandon Step 2 (+24h)",sub:"Your spot is still open",from:"The TMRW Team",ch:"Email",body:"Hey {{customer.first_name}},\n\nYou started your TMRW registration yesterday but didn't finish.\n\nWhatever brought you here is still true today. The question you had about your health, the thing you've been wanting to understand, the feeling that something could be better. That doesn't go away because life got busy.\n\nYour spot is still open.\n\n[COMPLETE MY REGISTRATION]\n\nYour TMRW Team"},
      {id:"1.5",t:"Cart Abandon Step 3 (+72h)",sub:"Why most members say they wish they'd started sooner",from:"The TMRW Team",ch:"Email",body:"Hey {{customer.first_name}},\n\nMost members don't say they wish they'd started sooner because of a specific result. They say it because of how it felt to finally understand what was going on inside their body. Not guessing. Not wondering. Knowing.\n\nYour registration is still open.\n\n[COMPLETE MY REGISTRATION]\n\nYour TMRW Team"},
      {id:"1.6",t:"Cart Abandon Step 4 (+7d)",sub:"Is something holding you back?",from:"The TMRW Team",ch:"Email",body:"Hey {{customer.first_name}},\n\nIt's been about a week since you started registering with TMRW, and we wanted to reach out one more time.\n\nIf something is holding you back, we'd genuinely like to know what it is. Whether it's the cost, the time commitment, not being sure if it's right for you, or just not understanding how it works. Those are all fair questions and we'd rather answer them than let you walk away wondering.\n\nHit reply and tell us what's on your mind. A real person will get back to you.\n\nYour TMRW Team"},
      {id:"PAY-1",t:"Payment Failed",sub:"Your payment didn't go through",from:"The TMRW Team",ch:"Email",body:"Hey {{customer.first_name}},\n\nWe tried to process your payment but it didn't go through. To keep your membership active, update your payment details here:\n\n[UPDATE PAYMENT]\n\nIf you've already sorted it or your bank flagged it by mistake, we'll retry automatically. If something else is going on, just hit reply.\n\nYour TMRW Team"},
      {id:"PAY-2",t:"Payment Reminder (+48h)",sub:"Your payment still needs updating",from:"The TMRW Team",ch:"Email + SMS",body:"Hey {{customer.first_name}},\n\nWe sent a note a couple of days ago about your payment not going through. It still hasn't been resolved.\n\nIf we're not able to process a valid payment in the next few days, we'll need to pause your membership. That means your clinical team won't be able to continue working on your plan, and your dashboard access will be suspended.\n\n[UPDATE PAYMENT]\n\nIf there's a reason you haven't been able to update it, or you want to talk through your options, hit reply.\n\nYour TMRW Team",sms:"Hey, it's TMRW. Your payment still needs updating. You can sort it here: {{payment_link}}"},
      {id:"PAY-3",t:"Membership Paused (+7d)",sub:"Your membership has been paused",from:"The TMRW Team",ch:"Email + SMS",body:"Hey {{customer.first_name}},\n\nWe've been trying to process your payment for the past week but haven't been able to get it through. Your membership has been paused.\n\nYour dashboard and health data are still there. Nothing has been deleted. But your clinical team can't continue working on your plan until your payment is resolved.\n\n[REACTIVATE MY MEMBERSHIP]\n\nIf you want to come back, it's one click. If something else is going on, hit reply and we'll work it out.\n\nYour TMRW Team",sms:"Hey, it's TMRW. Your membership has been paused. Reactivate here: {{payment_link}}"},
      {id:"PAY-4",t:"Subscription Renewal Confirmation",sub:"Your membership has renewed",from:"The TMRW Team",ch:"Email",body:"Hey {{customer.first_name}},\n\nYour TMRW membership has renewed and your payment of {{trigger.amount}} has been processed.\n\nYour clinical team continues to work on your plan, and your dashboard is always there when you want to check in on your progress.\n\nIf you have any questions about your membership or billing, just hit reply.\n\nYour TMRW Team"},
    ]},
    {name:"Onboarding Flow (7 emails)",tag:"tegan",emails:[
      {id:"OB-2",t:"Your Clinical Team",sub:"Your clinical team is on it",from:"The TMRW Team",ch:"Email",body:"Hi {{first_name}},\n\nYour TMRW clinical team has been assigned.\n\nThis isn't one person. It's a cross-functional clinical team working on your biology. They'll be reviewing your blood requisition, your clinical pathways, and formulating your pod formula, starting with your Customised Pods and refining it as your blood and epigenetic data come in.\n\nThey'll be reviewing your Health Story as soon as you complete it. The more you share in there, the more they have to work with.\n\nIf you haven't started it yet:\n\n[START MY HEALTH STORY]\n\nThe TMRW Team"},
      {id:"OB-3",t:"Health Story Complete \u2014 Everything Starts Now",sub:"You just set everything in motion",from:"The TMRW Team",ch:"Email + SMS",body:"Hi {{first_name}},\n\nYour Health Story is complete. Things are already moving.\n\nYour blood test requisition is being reviewed and prepared. You'll have it within 48 hours.\n\nYour Customised Pod formula is being created. That's 30 clinically selected ingredients based on what you shared, personalised to your profile. They'll ship within days. This is the first version of your formula. Once your blood results come in, it upgrades to your Personalised Pods. And when your full epigenetic data arrives, it evolves again into your Precision Pods, compounded from 107+ ingredients. The more data we have, the more precise it gets.\n\nAll of that started because of what you just completed.\n\nIf you'd like to talk through your goals or have questions about what's next, you can book a Welcome Call with your clinical team. It's 30 to 45 minutes, completely optional, and covers your Health Story, your goals, and a preview of what's coming.\n\n[BOOK A WELCOME CALL]\n\nYour blood requisition and Customised Pods are being prepared regardless.\n\nThe TMRW Team",sms:"Hey, it's TMRW. Your Health Story is complete. Your blood requisition and Customised Pods are in progress. We'll be in touch."},
      {id:"OB-4",t:"Welcome Call Invitation (optional)",sub:"Want to talk through your plan?",from:"The TMRW Team",ch:"Email",body:"Hi {{first_name}},\n\nYour clinical team is already working on your blood requisition and your Customised Pods. That's all in progress.\n\nIf you'd like to sit down with your clinical team, your Welcome Call is a good chance to do it. It's 30 to 45 minutes where you can review your Health Story together, set your health goals, and get a preview of what's coming as your data deepens.\n\nIt's optional. Nothing is waiting on it. But members who do it tend to feel more grounded in their plan from the start.\n\n[BOOK MY WELCOME CALL]\n\nAnd if you'd rather skip it and wait for your results, that's completely fine too.\n\nThe TMRW Team"},
      {id:"OB-5",t:"Welcome Call Confirmed",sub:"Your Welcome Call is booked",from:"The TMRW Team",ch:"Email",body:"Hi {{first_name}},\n\nYour Welcome Call is confirmed.\n\nDate: {{call_date}}\nTime: {{call_time}}\nDuration: 30 to 45 minutes\nJoin here: {{call_link}}\n\nYour clinical team will walk through your Health Story, talk about your health goals, and give you a preview of what's coming as your results come in.\n\nCome with whatever's on your mind. That's what the call is for.\n\nThe TMRW Team"},
      {id:"OB-6",t:"Welcome Call Day-Of Reminder",sub:"Your Welcome Call is today",from:"The TMRW Team",ch:"Email + SMS",body:"Hi {{first_name}},\n\nQuick reminder that your Welcome Call is today.\n\nTime: {{call_time}}\nJoin here: {{call_link}}\n\nYour clinical team will be ready for you. If you need to reschedule, just hit reply.\n\nThe TMRW Team",sms:"Hey, it's TMRW. Your Welcome Call is today at {{call_time}}. Join here: {{call_link}}"},
      {id:"OB-7",t:"Welcome Call No-Show",sub:"We missed you today",from:"The TMRW Team",ch:"Email",body:"Hi {{first_name}},\n\nLooks like we missed you on your Welcome Call today. No worries at all.\n\nYour blood requisition and Customised Pods are still being prepared. Nothing has paused.\n\nIf you'd like to rebook:\n\n[REBOOK MY WELCOME CALL]\n\nAnd if you'd rather skip it and wait for your results, that's fine too. Your clinical team is working on your plan either way.\n\nThe TMRW Team"},
    ]},
    {name:"Health Story Flow (7 emails)",tag:"tegan",emails:[
      {id:"HS-0B",t:"Still Haven't Started (+48h)",sub:"Your clinical team is waiting to meet you",from:"The TMRW Team",ch:"Email",body:"Hi {{first_name}},\n\nYour clinical team is ready to get to work, but they need to know who you are first. That's what your Health Story is for.\n\nIt's how your clinical team gets to know you. The more you tell them, the more specific your plan, your Customised Pod formula, and your blood test will be.\n\nEverything can begin once it's done.\n\n[START MY HEALTH STORY]\n\nIf something's getting in the way, just hit reply. We're here.\n\nThe TMRW Team"},
      {id:"HS-0C",t:"One Week Follow-Up",sub:"We don't want to start without you",from:"The TMRW Team",ch:"Email",body:"Hi {{first_name}},\n\nWe know life gets busy. But we wanted to reach out one more time, because your clinical team is ready and everything that comes next depends on your Health Story.\n\nYour clinical plan, your Customised Pod formula, your blood test. They're all built around what you tell us. The more you share, the more personalised they'll be.\n\nEverything is saved as you go, so you can do it in one sitting or come back to it.\n\n[START MY HEALTH STORY]\n\nIf you're unsure about anything, or if something's been holding you back, just hit reply. We'd genuinely like to help.\n\nThe TMRW Team"},
      {id:"HS-1",t:"Gentle Nudge (started, left)",sub:"Your Health Story unlocks everything",from:"The TMRW Team",ch:"Email + SMS",body:"Hi {{first_name}},\n\nYou started your Health Story, and it's saved and waiting for you.\n\nYour Health Story is what unlocks everything that comes next. Once it's complete, your clinical team can start building your plan, your Customised Pod formula can be created to your biology, and your blood test can be ordered.\n\nIt's also what makes all of that personal. Without it, your results are just numbers. With it, your team can build something that actually reflects what's going on inside your body.\n\nAnd don't be afraid to go into detail. The more your team knows, the more precise everything that follows will be.\n\n[CONTINUE MY HEALTH STORY]\n\nThe TMRW Team",sms:"Hey, it's TMRW. Your Health Story is what makes your better TMRW plan yours. Your clinical plan, Customised Pod formula, and blood test are all waiting on the other side: {{Health Story Link}}"},
      {id:"HS-2",t:"Progress Nudge (under 50%)",sub:"The best parts of your Health Story are still ahead",from:"The TMRW Team",ch:"Email",body:"Hi {{first_name}},\n\nYou've made a start on your Health Story. Everything so far is saved.\n\nThe sections still to go are the ones that matter most. They're the context that turns your data into something genuinely useful. It's what lets your clinical team look at your results and understand not just what the numbers say, but what they mean for you.\n\nIf something feels relevant, it probably is. The richer the picture you give your team, the more tailored your plan and your Customised Pod formula will be.\n\nOnce it's done, your clinical plan, Customised Pod formula, and blood test can all begin.\n\n[CONTINUE MY HEALTH STORY]\n\nThe TMRW Team"},
      {id:"HS-3",t:"Nearly There (over 50%)",sub:"Almost done. Your Customised Pod formula is waiting.",from:"The TMRW Team",ch:"Email",body:"Hi {{first_name}},\n\nYou're over halfway through your Health Story. The hard part is behind you.\n\nJust a few more sections and your clinical team will have the full picture. That means a plan built around your biology, not a template. A Customised Pod formula created for what your body actually needs, not a generic supplement. A blood test ordered based on what matters for you specifically.\n\nEverything you've shared so far is saved. Pick up right where you left off.\n\n[FINISH MY HEALTH STORY]\n\nThe TMRW Team"},
      {id:"HS-4",t:"Final Nudge (+5 days)",sub:"Your clinical team is ready when you are",from:"The TMRW Team",ch:"Email + SMS",body:"Hi {{first_name}},\n\nYour clinical team is ready to start working on your plan. Your Customised Pod formula is ready to be created. Your blood test is ready to be ordered. The one thing they're all waiting on is your Health Story.\n\nWe could start without it. But we won't. Because without your Health Story, your team would be interpreting your results without the full picture of what's been going on for you and what actually matters to you. And that's not how this should work. You came to TMRW for something more personal than that.\n\nEverything you've entered so far is saved. You can pick up where you left off anytime.\n\n[COMPLETE MY HEALTH STORY]\n\nIf something's getting in the way, or you'd rather talk through it with someone, just hit reply. We're here.\n\nThe TMRW Team",sms:"Hey, it's TMRW. Your clinical team is ready to start but they're waiting on your Health Story. It's the one thing between you and your plan. Pick up where you left off: {{Health Story Link}}"},
      {id:"HS-5",t:"Technical Failure",sub:"Your Health Story didn't submit properly",from:"The TMRW Team",ch:"Email",body:"Hi {{first_name}},\n\nIt looks like something went wrong when you tried to submit your Health Story. Don't worry, all your answers are saved.\n\nJust head back in and hit submit again. It should only take a moment. Once it's through, your clinical team can start building your plan, your Customised Pod formula can be created, and your blood test can be ordered. You were right there.\n\n[SUBMIT MY HEALTH STORY]\n\nIf it's still not working, hit reply and we'll sort it out for you.\n\nThe TMRW Team"},
    ]},
    {name:"Kit Fulfillment (8 emails)",tag:"tegan",emails:[
      {id:"3.1",t:"Kit Shipped + Prep",sub:"Your Little Prick Test has shipped",from:"The TMRW Team",ch:"Email + SMS",body:"Hey {{customer.first_name}},\n\nYour Little Prick Test has shipped. It should arrive within 1 to 3 business days.\n\nTracking: Australia Post \u2014 {{event.tracking_number}}\n\nBefore you collect, fast for 8 hours (water is fine) and try to collect within 2 hours of waking. Morning is best. Drink plenty of water the day before.\n\nWhen it arrives, register your kit at app.startmytomorrow.com, then follow the instructions inside. Let the card dry properly before sealing and drop it at any post office within 48 hours using the prepaid satchel.\n\nYour TMRW Team",sms:"Hey, it's TMRW. Your Little Prick Test has shipped. Should arrive within 1 to 3 business days. Tracking: {{event.tracking_number}}"},
      {id:"3.2",t:"Kit Delivered",sub:"Your Little Prick Test has been delivered",from:"The TMRW Team",ch:"Email",body:"Hey {{customer.first_name}},\n\nYour Little Prick Test has been delivered.\n\nBefore you collect, fast for 8 hours beforehand (water is fine), collect within 2 hours of waking, and morning gives the best results. Everything you need is inside the kit, and there's a QR code that walks you through the full collection process.\n\nThe first step is registering your kit so the lab can match your sample to your account.\n\n[REGISTER MY KIT]\n\nYour TMRW Team"},
      {id:"3.3",t:"Register Your Kit (+3d)",sub:"Your Little Prick Test needs registering",from:"The TMRW Team",ch:"Email + SMS",body:"Hey {{customer.first_name}},\n\nYour Little Prick Test was delivered a few days ago but hasn't been registered yet.\n\nRegistration links your sample to your account so the lab knows it's yours. It takes about 30 seconds: {{trigger.register_url}}\n\nIf you've already collected and posted your sample, it's worth registering now so everything's ready when it arrives.\n\nYour TMRW Team",sms:"Hey, it's TMRW. Your Little Prick Test still needs registering. Takes 30 seconds: {{register_url}}"},
      {id:"3.6",t:"Sample Not Received (+10d)",sub:"We haven't received your sample yet",from:"The TMRW Team",ch:"Email",body:"Hey {{customer.first_name}},\n\nWe haven't received your Little Prick Test sample yet.\n\nIf you haven't collected it, the prep is straightforward: fast for 8 hours, collect within 2 hours of waking, and scan the QR code in your kit for the full walkthrough.\n\nIf you've already posted it, it may still be in transit. Australia Post can take 2 to 3 business days. We'll let you know as soon as it reaches the lab.\n\nAny trouble? Reply here.\n\nYour TMRW Team"},
      {id:"3.7",t:"Last Automated Push (+21d)",sub:"Your Little Prick Test is still waiting",from:"The TMRW Team",ch:"Email + SMS",body:"Hey {{customer.first_name}},\n\nYour Little Prick Test arrived a while ago, but we haven't received your sample yet.\n\nIf you haven't had a chance to collect, the process is straightforward. Fast for 8 hours, collect within 2 hours of waking, follow the steps in your kit, and post it back using the prepaid satchel.\n\nIf your kit never arrived, got damaged, or something else got in the way, hit reply and we'll sort it out.\n\nYour TMRW Team",sms:"Hey, it's TMRW. We still haven't received your sample. If something got in the way, hit reply to your email and let us know."},
      {id:"3.2B",t:"Sample on Its Way",sub:"Your sample is on its way",from:"The TMRW Team",ch:"Email",body:"Hey {{customer.first_name}},\n\nYour sample is on its way. Transit to the lab typically takes 2 to 3 business days. Once it arrives, we'll let you know and the full analysis begins from there.\n\nNothing you need to do on your end. We'll keep you posted.\n\nYour TMRW Team"},
      {id:"3.12",t:"QC Pass \u2014 Shipped to Lab",sub:"Your sample passed quality checks",from:"The TMRW Team",ch:"Email",body:"Hey {{customer.first_name}},\n\nYour Little Prick Test sample passed our quality checks and is on its way to our partner lab.\n\nTransit typically takes 4 to 5 business days. Once it arrives, the full analysis begins. We'll keep you posted at each stage.\n\nYour TMRW Team"},
      {id:"3.11",t:"QC Fail at TMRW Office",sub:"Your Little Prick Test Update",from:"The TMRW Team",ch:"Email + SMS",body:"[See separate QC Fail document for full copy]\n\nOne job: Take complete ownership. The member must not feel like they failed. Fresh kit on the way, on us."},
    ]},
    {name:"Blood Test Flow (3 emails)",tag:"tegan",emails:[
      {id:"BT-1",t:"Requisition Sent",sub:"Your blood test requisition is ready",from:"The TMRW Team",ch:"Email + SMS + Slack",body:"Hi {{first_name}},\n\nYour blood test requisition has been sent through. You'll receive a barcode from Douglass Hanly Moir Pathology. Take this to any Douglass Hanly Moir collection centre near you. You can find your nearest centre at dhm.com.au.\n\nWhen you arrive, scan your barcode at the front desk and they'll take it from there.\n\nBefore you go, fast for 10 to 12 hours beforehand. Water is fine, and drink plenty of it the morning of. Avoid any strenuous exercise that morning. Try to get to the collection centre before 10am if you can.\n\nBring your barcode (printed or on your phone), your Medicare card, and a photo ID.\n\nOnce your bloods are done, your results come through to us directly. When they do, your clinical team reviews them and your Customised Pod formula upgrades to your Personalised Pods, refined from 30 to 70 ingredients based on what your blood panel shows.\n\nThat's it. Once your bloods are done, hit reply and let us know.\n\nThe TMRW Team",sms:"Hey, it's TMRW. Your blood test requisition has been sent. You'll get a barcode from Douglass Hanly Moir Pathology. Take it to any DHM collection centre. Fast for 10 to 12 hours and try to go before 10am. Check your email for the full details."},
      {id:"BT-2",t:"Blood Test 5-Day Follow-Up",sub:"Have you had your blood test?",from:"The TMRW Team",ch:"Email only",body:"Hi {{first_name}},\n\nWe sent your blood test requisition through a few days ago. Just checking in to see if you've had a chance to get it done.\n\nIf you have, hit reply and let us know. Your results will come through to us directly and we'll be in touch the moment they're in.\n\nIf you haven't got around to it yet, no stress. Take your barcode to any Douglass Hanly Moir collection centre. Just remember to fast for 10 to 12 hours and try to go before 10am. The sooner your bloods are done, the sooner your clinical team can get to work and your pod formula can upgrade.\n\nThe TMRW Team"},
      {id:"BT-3",t:"Blood Test Results Received",sub:"Your blood test results are in.",from:"The TMRW Team",ch:"Email + SMS + Slack",body:"Hi {{first_name}},\n\nYour blood test results have come through. Your clinical team is reviewing them now.\n\nThis is also when your pod formula evolves. Your Customised Pods were built from your Health Story. Now that your blood panel is in, your clinical team is refining your formula into your Personalised Pods, 70 ingredients tailored to what your biomarkers show. They'll ship once the review is done.\n\nNothing else you need to do on your end. We'll reach out when the review is complete.\n\nThe TMRW Team",sms:"Hey, it's TMRW. Your blood test results are in. Your clinical team is reviewing them now and your pod formula is being upgraded. We'll be in touch."},
    ]},
    {name:"Dead Zone Sequence (10 emails)",tag:"tegan",emails:[
      {id:"DZ-1",t:"Sample Received",sub:"Your sample has arrived at our lab",from:"The TMRW Team",ch:"Email + SMS",body:"Trigger: sample_received_lab\n\nOne job: Confirm receipt. Set timeline (2-3 weeks). Set the communication contract: we won't go quiet."},
      {id:"DZ-2",t:"Inside Scoop: Sleep (+3d)",sub:"Uses existing Inside Scoop template (EDM8)",from:"The TMRW Team",ch:"Email",body:"Trigger: sample_received + 3d\n\nUses Kareema's existing Inside Scoop sleep video email. Only the intro block changes."},
      {id:"DZ-3",t:"Inside Scoop: Brain Fog (+7d)",sub:"Uses existing Inside Scoop template (EDM10)",from:"The TMRW Team",ch:"Email",body:"Trigger: sample_received + 7d\n\nUses Kareema's existing Inside Scoop brain fog video email. Only the intro block changes."},
      {id:"DZ-4",t:"Results Preview (+12d)",sub:"Your results are getting closer",from:"The TMRW Team",ch:"Email + SMS",body:"Trigger: sample_received + 12d\n\nBuild anticipation. Reduce anxiety. Prepare the member for receiving results."},
      {id:"DZ-5",t:"Inside Scoop: Health Habits (+16d)",sub:"Uses existing Inside Scoop template",from:"The TMRW Team",ch:"Email",body:"Trigger: sample_received + 16d, results not ready\n\nPrepare the member for behaviour change before the plan arrives."},
      {id:"DZ-6",t:"Still Here Check-in (+18d)",sub:"Just checking in",from:"The TMRW Team",ch:"Email",body:"Trigger: sample_received + 18d, results not ready\n\nShow the member someone is still paying attention. Brevity is warmth."},
      {id:"DZ-7",t:"Delay Acknowledgment (+22d)",sub:"An update on your results",from:"The TMRW Team",ch:"Email + SMS",body:"Trigger: sample_received + 22d, results not ready\n\nAcknowledge the wait has exceeded the timeline. Proactive honesty."},
      {id:"DZ-8",t:"Clinician Manual Outreach (+28d)",sub:"N/A - manual",from:"Clinician",ch:"Email/Call",body:"[MANUAL] Day 28 or member expresses frustration.\n\nNo template. No automated copy. Clinician sends personal email or calls."},
      {id:"QC-1",t:"QC Fail: Internal",sub:"Your Little Prick Test Update",from:"The TMRW Team",ch:"Email + SMS",body:"Trigger: qc_fail_internal | Sentiment: 30\n\nTake complete ownership. The member must not feel like they failed. Fresh kit on the way, on us."},
      {id:"QC-2",t:"QC Fail: Lab",sub:"Your Little Prick Test Update",from:"The TMRW Team",ch:"Email + SMS + Call",body:"Trigger: qc_fail_lab | Sentiment: 25\n\nSave the member. This is the moment they are most likely to cancel. New kit within 48 hours + one month complimentary supplements."},
    ]},
    {name:"Dashboard Unlock (4 emails)",tag:"tegan",emails:[
      {id:"DU-1",t:"Dashboard Is Live",sub:"Your TMRW Dashboard is live",from:"TMRW Health",ch:"Email + SMS",body:"Hi {{first_name}},\n\nYour clinical analysis is complete and your TMRW Dashboard is live.\n\nLog in at app.startmytomorrow.com using your email address. You'll receive a 6-digit code as your password.\n\nInside you'll find your biological age clocks, your personalised health goals, and your Better TMRW Plan. Your plan is built across six areas of your health: Think, Eat, Move, Rest, Supplement, and Treat. Every recommendation comes from your data.\n\nYou'll also be receiving your Precision Pods. Your personalised supplement formula has been created based on your results, and your first order will be on its way. You'll find the details in Your Shop.\n\nThere's a lot in there. Take your time with it.\n\n[VIEW MY DASHBOARD]\n\nIf you'd like to go through your results with someone, you can book an Insights Call with your clinical team here: {{booking_link}}\n\nTMRW Health",sms:"Hey, it's TMRW. Your dashboard is live at app.startmytomorrow.com. Your results, your Better TMRW Plan, and your Precision Pods are all ready. Have a look when you get a chance."},
      {id:"DU-2",t:"Haven't Logged In (+48h)",sub:"Have you seen your biological clocks?",from:"TMRW Health",ch:"Email",body:"Hi {{first_name}},\n\nWe wanted to point you to one thing in your dashboard in particular.\n\nYour Biological Clocks show how your body is ageing at a cellular level compared to your actual age. It's usually the first thing members want to talk about, and it's a good place to start.\n\nFrom there, your Better TMRW Plan breaks everything down across Think, Eat, Move, Rest, Supplement, and Treat. Each one is built around what your results show.\n\nLog in at app.startmytomorrow.com and have a look.\n\n[VIEW MY DASHBOARD]\n\nIf you'd rather talk through your results first, you can book an Insights Call here: {{booking_link}}\n\nTMRW Health"},
      {id:"DU-3",t:"Name the Friction (+8d)",sub:"Quick question",from:"TMRW Health",ch:"Email + SMS",body:"Hi {{first_name}},\n\nWe wanted to reach out one more time.\n\nYour dashboard and results have been ready for about a week now, and we haven't heard from you. That's completely fine. But we also know that sometimes the reason people don't log in isn't because they're too busy. Sometimes it's because the dashboard feels like a lot to take in, or you're not sure where to start, or you just haven't got around to it.\n\nIf any of that sounds familiar, your clinical team is here. You can book an Insights Call and we'll go through everything together. You don't need to have looked at anything first. We start wherever you are.\n\n{{booking_link}}\n\nAnd if something else is going on, or you just have a question, hit reply. We're here.\n\nTMRW Health",sms:"Hey, it's TMRW. Your dashboard has been live for about a week. Your results and plan are ready whenever you are: app.startmytomorrow.com"},
      {id:"DU-4",t:"Clinician Manual Outreach (+10d)",sub:"N/A - personal message",from:"Clinician",ch:"Email/Call/SMS",body:"[MANUAL] Day 10. Not automated. Not templated.\n\nSystem notifies the assigned clinician via Oracle task and/or Slack. They reach out personally. The value is that it feels different from the automated sequence."},
    ]},
        {name:"Customised Pods (5 emails)",tag:"tegan",emails:[
      {id:"CP-1.0",t:"Order Confirmed",sub:"Your first pod formula is being created",from:"The TMRW Team",ch:"Email + SMS",body:"Hi {{customer.first_name}},\n\nYour Customised Pod formula is being created.\n\nYour clinical team has reviewed your Health Story and is building your first formula from it. That\u2019s 30 clinically selected ingredients based on your profile, your goals, and your medical history. It\u2019s checked by your clinical team and compounded under the supervision of a licensed pharmacist.\n\nThis is the first version of your formula. As your blood results and epigenetic data come in over the coming weeks, it gets more precise. 30 ingredients becomes 70, then 107+. Your pods evolve as your data deepens.\n\nWe\u2019ll send tracking when they ship.\n\nThe TMRW Team",sms:"Hey, it\u2019s TMRW. Your Customised Pod formula is being created. 30 ingredients built from your Health Story. We\u2019ll send tracking when they ship."},
      {id:"CP-1.1",t:"With Pharmacy",sub:"Your pods are with our pharmacy team",from:"The TMRW Team",ch:"Email",body:"Hi {{customer.first_name}},\n\nYour Customised Pod order is now with our pharmacy team.\n\nA licensed compounding pharmacist is reviewing your formulation for accuracy and safety. Once approved, your pods are compounded under their supervision, then packed and dispatched. Usually within 48 to 72 hours.\n\nWe\u2019ll send tracking as soon as they ship.\n\nThe TMRW Team"},
      {id:"CP-1.2",t:"Shipped",sub:"Your Customised Pods have shipped",from:"The TMRW Team",ch:"Email + SMS",body:"Hi {{customer.first_name}},\n\nYour Customised Pods are on their way.\n\nTrack your delivery here: {{Tracking Link}}\n\nWhile you wait, here\u2019s how to take them when they arrive.\n\n{{Video: How to take your pods}}\nhttps://drive.google.com/file/d/1_OCnSw11ITIH5HI2RNZOvViD2pIYpCdC/view\n\nOne pod per day. Tear off the seal, create a small hollow on your tongue, pour a small amount in, sip water gently, and swallow. Repeat until the full serving is finished. If you\u2019d prefer, you can sprinkle the granules onto small spoonfuls of plain yoghurt and swallow without chewing.\n\nStore below 25\u00b0C in a cool, dry place.\n\nThe TMRW Team"},
      {id:"CP-1.3",t:"Delivered",sub:"Your Customised Pods have arrived",from:"The TMRW Team",ch:"Email + SMS",body:"Hi {{customer.first_name}},\n\nYour Customised Pods are here. 30 ingredients, built from your Health Story, reviewed by your clinical team, and now in your hands.\n\nThis is the first version of your formula. When your blood results come in, it upgrades to your Personalised Pods. And when your full epigenetic data arrives, it evolves into your Precision Pods. The more data we have, the more precise it gets.\n\nBefore you get started, here\u2019s everything you need to know about taking them.\n\n{{Video: How to take your pods}}\nhttps://drive.google.com/file/d/1_OCnSw11ITIH5HI2RNZOvViD2pIYpCdC/view\n\nHow to take your pods (one pod per day):\nTear off the seal and create a small hollow on your tongue. Pour a small amount of the granules in, sip water gently, tilt your head slightly back, and swallow. Repeat until the full serving is finished.\n\nTips:\nDon\u2019t try to swallow the whole serving at once, take it gradually. Once the granules are in your mouth, swallow promptly rather than chewing or letting them sit. If you\u2019d prefer an easier option, you can sprinkle the granules onto small spoonfuls of plain yoghurt and swallow without chewing.\n\nStorage:\nStore below 25\u00b0C in a cool, dry place. Don\u2019t use a pod if the seal is broken. Keep out of reach of children.\n\nIf you notice any side effects or anything feels off, just hit reply and let us know. If you\u2019re ever concerned, your GP is always a good port of call too.\n\nThe TMRW Team",sms:"Hey, it\u2019s TMRW. Your Customised Pods have arrived. Check your email for a video on how to take them."},
      {id:"CP-1.4",t:"2-Week Check-in",sub:"How are the pods going?",from:"Your TMRW Clinical Team",ch:"Email",body:"Hi {{customer.first_name}},\n\nYou\u2019re about two weeks into your Customised Pods. This is the point where we like to check in.\n\nSome people notice changes in energy, sleep, or digestion early. Some notice shifts in focus or mood. Some don\u2019t notice much yet. All of that is useful information, and none of it is wrong.\n\nWe\u2019re interested in the subtle things as much as the obvious ones. The way you\u2019re waking up, how your energy holds through the afternoon, whether your gut feels any different. These are the signals your clinical team uses to understand how your body is responding.\n\nJust hit reply and let us know how you\u2019re going. Your feedback goes directly to your clinical team.\n\nYour TMRW Clinical Team"},
    ]},
    {name:"Personalised Pods (3 emails)",tag:"tegan",emails:[
      {id:"PP-1.0",t:"Upgrade Notification",sub:"Your pod formula just got more precise",from:"The TMRW Team",ch:"Email + SMS",body:"Hi {{customer.first_name}},\n\nYour blood test results are in, and your pod formula is evolving.\n\nYour Customised Pods were built from your Health Story. Now that your blood panel is in, your clinical team is refining your formula into your Personalised Pods. That\u2019s 70 ingredients, tailored to what your biomarkers actually show. The things your blood tells us that your Health Story couldn\u2019t.\n\nThey\u2019ll ship once the formulation is complete. We\u2019ll send tracking when they\u2019re on the way.\n\nOne more tier to go. When your full epigenetic data arrives, your formula evolves again into your Precision Pods, compounded from 107+ ingredients. That\u2019s the complete picture.\n\nThe TMRW Team",sms:"Hey, it\u2019s TMRW. Your blood results are in and your pod formula is upgrading. Personalised Pods, 70 ingredients refined by your biomarkers. We\u2019ll send tracking when they ship."},
      {id:"PP-1.1",t:"Shipped",sub:"Your Personalised Pods have shipped",from:"The TMRW Team",ch:"Email + SMS",body:"Hi {{customer.first_name}},\n\nYour Personalised Pods are on their way. 70 ingredients, refined by your blood results.\n\nTrack your delivery here: {{Tracking Link}}\n\nSame pods, same routine, more precise formula. Here\u2019s a quick refresher on how to take them.\n\n{{Video: How to take your pods}}\nhttps://drive.google.com/file/d/1_OCnSw11ITIH5HI2RNZOvViD2pIYpCdC/view\n\nOne pod per day. Tear off the seal, create a small hollow on your tongue, pour a small amount in, sip water gently, and swallow. Repeat until the full serving is finished. If you\u2019d prefer, you can sprinkle the granules onto small spoonfuls of plain yoghurt and swallow without chewing.\n\nIf you notice any changes as your body adjusts to the new formulation, hit reply and let us know.\n\nThe TMRW Team"},
      {id:"PP-1.2",t:"Delivered",sub:"Your Personalised Pods have arrived",from:"The TMRW Team",ch:"Email + SMS",body:"Hi {{customer.first_name}},\n\nYour Personalised Pods are here. 70 ingredients, refined by your blood results, reviewed by your clinical team.\n\nYour formula has evolved from the Customised Pods you\u2019ve been taking. Same format, same routine, but now informed by what your biomarkers showed. The precision goes up from here. When your full epigenetic data arrives, your formula evolves one more time into your Precision Pods.\n\nHere\u2019s a refresher on how to take them.\n\n{{Video: How to take your pods}}\nhttps://drive.google.com/file/d/1_OCnSw11ITIH5HI2RNZOvViD2pIYpCdC/view\n\nHow to take your pods (one pod per day):\nTear off the seal and create a small hollow on your tongue. Pour a small amount of the granules in, sip water gently, tilt your head slightly back, and swallow. Repeat until the full serving is finished.\n\nTips:\nDon\u2019t try to swallow the whole serving at once, take it gradually. Once the granules are in your mouth, swallow promptly rather than chewing or letting them sit. If you\u2019d prefer an easier option, you can sprinkle the granules onto small spoonfuls of plain yoghurt and swallow without chewing.\n\nStorage:\nStore below 25\u00b0C in a cool, dry place. Don\u2019t use a pod if the seal is broken. Keep out of reach of children.\n\nIf you notice any side effects or anything feels off, just hit reply and let us know. If you\u2019re ever concerned, your GP is always a good port of call too.\n\nThe TMRW Team",sms:"Hey, it\u2019s TMRW. Your Personalised Pods have arrived. Check your email for a video on how to take them."},
    ]},
    
    {name:"Insights Call (6 emails)",tag:"tegan",emails:[
      {id:"5.1",t:"Booking Confirmation",sub:"Your Insights Call is booked",from:"The TMRW Team",ch:"Email",body:"Hey {{customer.first_name}},\n\nYour Insights Call is confirmed.\n\nDate: {{call_date}}\nTime: {{call_time}}\nDuration: 30 to 45 minutes\nJoin here: {{call_link}}\n\nYour clinical team will walk through your results, what they mean for you, and your Better TMRW Plan. They'll cover what's working well, what needs attention, and your next steps. If you have questions about advanced testing or anything else, this is the time to ask.\n\nCome with whatever's on your mind. That's what the call is for.\n\nThe TMRW Team"},
      {id:"5.2",t:"Reminder (Day Before)",sub:"Your Insights Call is tomorrow",from:"The TMRW Team",ch:"Email",body:"Hey {{customer.first_name}},\n\nQuick reminder that your Insights Call is tomorrow at {{call_time}}.\n\nYour clinical team will walk you through your results and your Better TMRW Plan. If you've got specific questions, bring them along.\n\nJoin here: {{call_link}}\n\nThe TMRW Team"},
      {id:"5.3",t:"Reminder (Day Of)",sub:"Your Insights Call is today",from:"The TMRW Team",ch:"Email + SMS",body:"Hey {{customer.first_name}},\n\nYour Insights Call is today at {{call_time}}.\n\nJoin here: {{call_link}}\n\nYour clinical team will be ready for you. If you need to reschedule, just hit reply.\n\nThe TMRW Team",sms:"Hey, it's TMRW. Your Insights Call is today at {{call_time}}. Join here: {{call_link}}"},
      {id:"5.4",t:"Reschedule",sub:"Your Insights Call has been rescheduled",from:"The TMRW Team",ch:"Email",body:"Hey {{customer.first_name}},\n\nYour Insights Call has been rescheduled.\n\nNew date: {{call_date}}\nNew time: {{call_time}}\nJoin here: {{call_link}}\n\nYour clinical team will be ready for you.\n\nThe TMRW Team"},
      {id:"5.5",t:"Cancellation",sub:"Your Insights Call was cancelled",from:"The TMRW Team",ch:"Email",body:"Hey {{customer.first_name}},\n\nYour Insights Call has been cancelled. Your results and your Better TMRW Plan are still ready in your dashboard whenever you want to look through them.\n\nIf you'd like to rebook, you can do that here:\n\n[REBOOK MY INSIGHTS CALL]\n\nNo rush. Your clinical team is here when you're ready.\n\nThe TMRW Team"},
      {id:"5.6",t:"No-Show",sub:"We missed you today",from:"The TMRW Team",ch:"Email",body:"Hey {{customer.first_name}},\n\nLooks like we missed you on your Insights Call today. No worries at all.\n\nYour results and your Better TMRW Plan are live in your dashboard. You can explore them anytime at app.startmytomorrow.com.\n\nIf you'd like to rebook the call:\n\n[REBOOK MY INSIGHTS CALL]\n\nAnd if you'd rather go through your dashboard on your own, that's completely fine too. Your clinical team is working on your plan either way.\n\nThe TMRW Team"},

      {id:"QC-1",t:"QC Fail: Internal",sub:"Your Little Prick Test Update",from:"The TMRW Team",ch:"Email + SMS",body:"Trigger: qc_fail_internal | Sentiment: 30\n\nTake complete ownership. The member must not feel like they failed. Fresh kit on the way, on us."},
      {id:"QC-2",t:"QC Fail: Lab",sub:"Your Little Prick Test Update",from:"The TMRW Team",ch:"Email + SMS + Call",body:"Trigger: qc_fail_lab | Sentiment: 25\n\nSave the member. This is the moment they are most likely to cancel. New kit within 48 hours + one month complimentary supplements."},

    {name:"Dashboard Unlock (4 emails)",tag:"tegan",emails:[
      {id:"DU-1",t:"Dashboard Is Live",sub:"Your TMRW Dashboard is live",from:"TMRW Health",ch:"Email + SMS",body:"Hi {{first_name}},\n\nYour clinical analysis is complete and your TMRW Dashboard is live.\n\nLog in at app.startmytomorrow.com using your email address. You'll receive a 6-digit code as your password.\n\nInside you'll find your biological age clocks, your personalised health goals, and your Better TMRW Plan. Your plan is built across six areas of your health: Think, Eat, Move, Rest, Supplement, and Treat. Every recommendation comes from your data.\n\nYou'll also be receiving your Precision Pods. Your personalised supplement formula has been created based on your results, and your first order will be on its way. You'll find the details in Your Shop.\n\nThere's a lot in there. Take your time with it.\n\n[VIEW MY DASHBOARD]\n\nIf you'd like to go through your results with someone, you can book an Insights Call with your clinical team here: {{booking_link}}\n\nTMRW Health",sms:"Hey, it's TMRW. Your dashboard is live at app.startmytomorrow.com. Your results, your Better TMRW Plan, and your Precision Pods are all ready. Have a look when you get a chance."},
      {id:"DU-2",t:"Haven't Logged In (+48h)",sub:"Have you seen your biological clocks?",from:"TMRW Health",ch:"Email",body:"Hi {{first_name}},\n\nWe wanted to point you to one thing in your dashboard in particular.\n\nYour Biological Clocks show how your body is ageing at a cellular level compared to your actual age. It's usually the first thing members want to talk about, and it's a good place to start.\n\nFrom there, your Better TMRW Plan breaks everything down across Think, Eat, Move, Rest, Supplement, and Treat. Each one is built around what your results show.\n\nLog in at app.startmytomorrow.com and have a look.\n\n[VIEW MY DASHBOARD]\n\nIf you'd rather talk through your results first, you can book an Insights Call here: {{booking_link}}\n\nTMRW Health"},
      {id:"DU-3",t:"Name the Friction (+8d)",sub:"Quick question",from:"TMRW Health",ch:"Email + SMS",body:"Hi {{first_name}},\n\nWe wanted to reach out one more time.\n\nYour dashboard and results have been ready for about a week now, and we haven't heard from you. That's completely fine. But we also know that sometimes the reason people don't log in isn't because they're too busy. Sometimes it's because the dashboard feels like a lot to take in, or you're not sure where to start, or you just haven't got around to it.\n\nIf any of that sounds familiar, your clinical team is here. You can book an Insights Call and we'll go through everything together. You don't need to have looked at anything first. We start wherever you are.\n\n{{booking_link}}\n\nAnd if something else is going on, or you just have a question, hit reply. We're here.\n\nTMRW Health",sms:"Hey, it's TMRW. Your dashboard has been live for about a week. Your results and plan are ready whenever you are: app.startmytomorrow.com"},
      {id:"DU-4",t:"Clinician Manual Outreach (+10d)",sub:"N/A - personal message",from:"Clinician",ch:"Email/Call/SMS",body:"[MANUAL] Day 10. Not automated. Not templated.\n\nSystem notifies the assigned clinician via Oracle task and/or Slack. They reach out personally. The value is that it feels different from the automated sequence."},
    ]},
    {name:"Precision Pods (6 emails)",tag:"tegan",emails:[
      {id:"XP-1.0",t:"Upgrade Notification",sub:"Your formula just reached its final form",from:"The TMRW Team",ch:"Email + SMS",body:"Hi {{customer.first_name}},\n\nYour full epigenetic results are in. This is the moment your formula reaches its final form.\n\nYour clinical team is now compounding your Precision Pods. That\u2019s 107+ ingredients drawn from your complete biological profile: your Health Story, your blood results, and your full epigenetic data. 1,700+ data points, translated into one daily pod.\n\nYour Customised Pods were the starting point. Your Personalised Pods refined it. This is the complete picture. And it keeps getting sharper. Every time you retest (4 times a year), your formula is reformulated based on what\u2019s changed.\n\nWe\u2019ll send tracking when they ship.\n\nThe TMRW Team",sms:"Hey, it\u2019s TMRW. Your full epigenetic results are in. Your Precision Pods are being compounded. 107+ ingredients from your complete biological profile. We\u2019ll send tracking when they ship."},
      {id:"XP-1.1",t:"With Pharmacy",sub:"Your Precision Pods are with our pharmacy team",from:"The TMRW Team",ch:"Email",body:"Hi {{customer.first_name}},\n\nYour Precision Pod order is now with our pharmacy team.\n\nA licensed compounding pharmacist is reviewing your formulation for accuracy and safety. Once approved, your pods are compounded under their supervision, then packed and dispatched. Usually within 48 to 72 hours.\n\nThis is the part where your biology becomes something you can hold in your hand.\n\nWe\u2019ll send tracking as soon as they ship.\n\nThe TMRW Team"},
      {id:"XP-1.2",t:"Shipped",sub:"Your Precision Pods have shipped",from:"The TMRW Team",ch:"Email + SMS",body:"Hi {{customer.first_name}},\n\nYour Precision Pods are on their way.\n\nTrack your delivery here: {{Tracking Link}}\n\nWhile you wait, here\u2019s a refresher on how to take them when they arrive.\n\n{{Video: How to take your pods}}\nhttps://drive.google.com/file/d/1_OCnSw11ITIH5HI2RNZOvViD2pIYpCdC/view\n\nOne pod per day. Tear off the seal, create a small hollow on your tongue, pour a small amount in, sip water gently, and swallow. Repeat until the full serving is finished. If you\u2019d prefer, you can sprinkle the granules onto small spoonfuls of plain yoghurt and swallow without chewing.\n\nStore below 25\u00b0C in a cool, dry place.\n\nThe TMRW Team"},
      {id:"XP-1.3",t:"Delivered",sub:"Your Precision Pods have arrived",from:"The TMRW Team",ch:"Email + SMS",body:"Hi {{customer.first_name}},\n\nYour Precision Pods are here. 107+ ingredients, built from your complete biological profile, reviewed by your clinical team, and now in your hands.\n\nBefore you get started, here\u2019s everything you need to know about taking them.\n\n{{Video: How to take your pods}}\nhttps://drive.google.com/file/d/1_OCnSw11ITIH5HI2RNZOvViD2pIYpCdC/view\n\nHow to take your pods (one pod per day):\nTear off the seal and create a small hollow on your tongue. Pour a small amount of the granules in, sip water gently, tilt your head slightly back, and swallow. Repeat until the full serving is finished.\n\nTips:\nDon\u2019t try to swallow the whole serving at once, take it gradually. Once the granules are in your mouth, swallow promptly rather than chewing or letting them sit. If you\u2019d prefer an easier option, you can sprinkle the granules onto small spoonfuls of plain yoghurt and swallow without chewing.\n\nStorage:\nStore below 25\u00b0C in a cool, dry place. Don\u2019t use a pod if the seal is broken. Keep out of reach of children.\n\nIf you notice any side effects or anything feels off, just hit reply and let us know. If you\u2019re ever concerned, your GP is always a good port of call too.\n\nThe TMRW Team",sms:"Hey, it\u2019s TMRW. Your Precision Pods have arrived. Check your email for a video on how to take them."},
      {id:"XP-1.4",t:"2-Week Check-in",sub:"How are the pods going?",from:"Your TMRW Clinical Team",ch:"Email",body:"Hi {{customer.first_name}},\n\nYou\u2019re about two weeks into your Precision Pods. Your clinical team built that formulation around your specific biology, and this is the point where we like to check in.\n\nSome people notice changes in energy, sleep, or digestion early. Some notice shifts in focus or mood. Some don\u2019t notice much yet. All of that is useful information, and none of it is wrong.\n\nWe\u2019re interested in the subtle things as much as the obvious ones. The way you\u2019re waking up, how your energy holds through the afternoon, whether your gut feels any different. These are the signals your clinical team uses to understand how your body is responding and whether anything in your formulation needs adjusting.\n\nIf something feels different, tell us. If something feels off, we want to know that too. And if nothing has changed yet, that\u2019s still worth sharing.\n\nJust hit reply and let us know how you\u2019re going. Your feedback goes directly to your clinical team.\n\nYour TMRW Clinical Team"},
      {id:"XP-1.5",t:"Renewal Reminder",sub:"Your next Precision Pods are on the way",from:"The TMRW Team",ch:"Email + SMS",body:"Hi {{customer.first_name}},\n\nYour next set of Precision Pods is almost ready to begin.\n\nIn 3 days, your payment will process and your formulation moves to our pharmacy team for review, then into preparation and dispatch. Same precision, personalised to your biology, reviewed by your clinical team.\n\nIf you need to update your delivery details, pause, or make any changes, you can manage everything in your Dashboard.\n\nThe TMRW Team",sms:"Hey, it\u2019s TMRW. Your next Precision Pods begin formulation in 3 days. Need to make changes? {{Dashboard Link}}"},
    ]},

let allEmails=[];
flows.forEach(fl=>{fl.emails.forEach(em=>{allEmails.push({...em,flow:fl.name});});});

function saveComment(id,text){if(text.trim())comments[id]=text.trim();else delete comments[id];localStorage.setItem('tmrw-comments',JSON.stringify(comments));editingComment=null;render();}
function setStatus(id,val){if(val)statuses[id]=val;else delete statuses[id];localStorage.setItem('tmrw-statuses',JSON.stringify(statuses));render();}
function saveNote(id,text){if(text.trim())statusNotes[id]=text.trim();else delete statusNotes[id];localStorage.setItem('tmrw-status-notes',JSON.stringify(statusNotes));editingNote=null;render();}
function getStatus(id){return statuses[id]||'Approved';}
function sc(s){return s==='Live'?'s-live':s==='Approved'?'s-approved':s==='To Do'?'s-todo':s==='To Review'?'s-review':s==='Blocked'?'s-blocked':s==='Cut'?'s-cut':'s-approved';}

function renderTabs(){
  document.getElementById('tabs').innerHTML=[{k:'emails',l:'Email Content'},{k:'status',l:'Status'}].map(t=>'<a class="'+(tab===t.k?'act':'')+'" onclick="tab=\''+t.k+'\';render()">'+t.l+'</a>').join('');
}

function renderEmails(){
  let h='';
  flows.forEach(fl=>{
    h+='<div class="flow-group"><div class="flow-hdr"><h2>'+fl.name+'</h2><span class="cnt">'+fl.emails.length+'</span></div>';
    fl.emails.forEach(em=>{
      let isOpen=openEmails[em.id];
      let st=getStatus(em.id);
      h+='<div class="email"><div class="email-top" onclick="openEmails[\''+em.id+'\']=!openEmails[\''+em.id+'\'];render()">';
      h+='<span class="chv '+(isOpen?'open':'')+'">&#9654;</span>';
      h+='<span class="eid">'+em.id+'</span>';
      h+='<span class="etitle">'+em.t+'</span>';
      h+='<span class="ech">'+em.ch+'</span>';
      h+='<select class="ssel'+(statuses[em.id]?' ch':'')+'" onclick="event.stopPropagation()" onchange="setStatus(\''+em.id+'\',this.value)" style="font-size:10px;padding:4px 8px;border-radius:6px;border:1px solid var(--border);font-family:inherit;cursor:pointer;min-width:80px">';
      ['Approved','Live','To Do','To Review','Blocked','Cut'].forEach(s=>{h+='<option value="'+s+'"'+(st===s?' selected':'')+'>'+s+'</option>';});
      h+='</select>';
      h+='</div>';
      if(isOpen){
        h+='<div class="email-body"><div class="meta-row">';
        h+='<div><div class="meta-label">Subject</div><div class="meta-val">'+em.sub+'</div></div>';
        h+='<div><div class="meta-label">From</div><div class="meta-val">'+em.from+'</div></div>';
        h+='<div><div class="meta-label">Channel</div><div class="meta-val">'+em.ch+'</div></div></div>';
        h+='<div class="copy-box"><div class="copy-label">Email Copy</div><div class="copy-text">'+em.body.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div></div>';
        if(em.sms){h+='<div class="sms-box"><div class="sms-label">SMS</div><div class="sms-text">'+em.sms.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div></div>';}
        let hasC=comments[em.id],isE=editingComment===em.id;
        if(hasC&&!isE){h+='<div class="comment-box"><div class="comment-label">Comment</div><div class="comment-text">'+comments[em.id]+'</div><div style="margin-top:8px"><button class="bt bt-c" onclick="editingComment=\''+em.id+'\';render()">Edit</button></div></div>';}
        if(!hasC&&!isE){h+='<button class="add-comment" onclick="editingComment=\''+em.id+'\';render()">+ Add comment</button>';}
        if(isE){
          h+='<textarea class="ci" id="ci-'+em.id.replace(/[^a-z0-9]/gi,'')+'" placeholder="Comment on this email copy...">'+(comments[em.id]||'')+'</textarea>';
          h+='<div class="br"><button class="bt bt-s" onclick="saveComment(\''+em.id+'\',document.getElementById(\'ci-'+em.id.replace(/[^a-z0-9]/gi,'')+'\').value)">Save</button>';
          if(hasC)h+='<button class="bt bt-d" onclick="saveComment(\''+em.id+'\',\'\')">Delete</button>';
          h+='<button class="bt bt-c" onclick="editingComment=null;render()">Cancel</button></div>';
        }
        h+='</div>';}
      h+='</div>';
    });
    h+='</div>';
  });
  return h;
}

function renderStatus(){
  let h='';
  let total=allEmails.length,byS={};
  allEmails.forEach(em=>{let s=getStatus(em.id);byS[s]=(byS[s]||0)+1;});
  h+='<div class="summary-bar">';
  h+='<div class="si"><div class="sn">'+total+'</div><div class="sl">Total</div></div>';
  ['Live','Approved','To Do','To Review','Blocked','Cut'].forEach(s=>{if(byS[s])h+='<div class="si"><div class="sn" style="color:var(--'+(s==='Live'?'blue':s==='Approved'?'green':s==='To Do'?'purple':s==='To Review'?'amber':s==='Blocked'?'red':'sub')+')">'+byS[s]+'</div><div class="sl">'+s+'</div></div>';});
  h+='<div class="si"><div class="sn" style="color:var(--accent)">'+Object.keys(comments).length+'</div><div class="sl">Comments</div></div>';
  h+='</div>';
  h+='<div class="filters">';
  [['all','All ('+total+')'],['Live','Live'],['Approved','Approved'],['To Do','To Do'],['To Review','To Review'],['Blocked','Blocked'],['commented','With comments'],['noted','With notes']].forEach(([k,l])=>{
    h+='<span class="fb '+(statusFilter===k?'act':'')+'" onclick="statusFilter=\''+k+'\';render()">'+l+'</span>';
  });
  h+='</div>';
  flows.forEach(fl=>{
    let items=fl.emails.filter(em=>{
      if(statusFilter==='all')return true;
      if(statusFilter==='commented')return comments[em.id];
      if(statusFilter==='noted')return statusNotes[em.id];
      return getStatus(em.id)===statusFilter;
    });
    if(!items.length)return;
    h+='<div class="ss"><h3>'+fl.name+'</h3>';
    items.forEach(em=>{
      let st=getStatus(em.id),isC=statuses[em.id]!==undefined,hasN=statusNotes[em.id],isEN=editingNote===em.id;
      h+='<div class="sr"><span class="sid">'+em.id+'</span><span class="st">'+em.t+'</span><span class="ech">'+em.ch+'</span>';
      h+='<select class="ssel'+(isC?' ch':'')+'" onchange="setStatus(\''+em.id+'\',this.value)">';
      ['Approved','Live','To Do','To Review','Blocked','Cut'].forEach(s=>{h+='<option value="'+s+'"'+(st===s?' selected':'')+'>'+s+'</option>';});
      h+='</select>';
      h+='<span class="nb" onclick="editingNote=editingNote===\''+em.id+'\'?null:\''+em.id+'\';render()">'+(hasN?'&#9998;':'&#43;')+'</span></div>';
      if(hasN&&!isEN)h+='<div style="padding:0 14px 8px 62px;font-size:11px;color:var(--accent);font-style:italic">'+statusNotes[em.id]+'</div>';
      if(isEN){
        h+='<div style="padding:0 14px 8px 62px;display:flex;gap:6px"><input id="ni-'+em.id.replace(/[^a-z0-9]/gi,'')+'" value="'+(statusNotes[em.id]||'').replace(/"/g,'&quot;')+'" placeholder="Add a note..." style="flex:1;padding:5px 10px;border:1px solid var(--border);border-radius:6px;font-size:11px;font-family:inherit;outline:none" onkeydown="if(event.key===\'Enter\')saveNote(\''+em.id+'\',this.value)">';
        h+='<button class="bt bt-s" onclick="saveNote(\''+em.id+'\',document.getElementById(\'ni-'+em.id.replace(/[^a-z0-9]/gi,'')+'\').value)">Save</button>';
        if(hasN)h+='<button class="bt bt-d" onclick="saveNote(\''+em.id+'\',\'\')">Del</button>';
        h+='</div>';
      }
    });
    h+='</div>';
  });
  h+='<div style="margin-top:24px;text-align:center"><button class="bt bt-s" style="padding:12px 28px;font-size:12px" onclick="downloadCSV()">Download CSV</button></div>';
  return h;
}

function downloadCSV(){
  let rows=[['Flow','ID','Title','Channel','Status','Comment','Note']];
  allEmails.forEach(em=>{rows.push([em.flow,em.id,em.t,em.ch,getStatus(em.id),comments[em.id]||'',statusNotes[em.id]||'']);});
  let csv=rows.map(r=>r.map(c=>'"'+(c||'').replace(/"/g,'""')+'"').join(',')).join('\n');
  let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='tmrw-comms-'+new Date().toISOString().split('T')[0]+'.csv';a.click();
}

function render(){renderTabs();document.getElementById('content').innerHTML=tab==='emails'?renderEmails():renderStatus();}
render();
</script>
