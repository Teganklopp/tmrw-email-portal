<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMRW Email Portal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#f8f6f3;color:#1a1a1a;min-height:100vh}
.pw-gate{position:fixed;inset:0;background:#1a1a1a;display:flex;align-items:center;justify-content:center;z-index:9999}
.pw-box{text-align:center;color:#fff;width:320px}
.pw-box .logo{font-family:'DM Serif Display',serif;font-size:28px;margin-bottom:4px;letter-spacing:1px}
.pw-box .sub{font-size:11px;color:#888;margin-bottom:28px}
.pw-box input{width:100%;padding:14px 16px;border-radius:10px;border:1px solid #333;background:#222;color:#fff;font-family:'DM Sans',system-ui,sans-serif;font-size:14px;outline:none;margin-bottom:12px}
.pw-box input::placeholder{color:#555}
.pw-box input:focus{border-color:#c97b5a}
.pw-box button{width:100%;padding:14px;border-radius:10px;border:none;background:#c97b5a;color:#fff;font-family:'DM Sans',system-ui,sans-serif;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.5px}
.pw-box button:hover{background:#b56a49}
.pw-err{color:#e87;font-size:11px;margin-top:8px;display:none}
.hidden{display:none!important}
header{background:#1a1a1a;color:#fff;padding:0 20px;display:flex;align-items:center;height:52px;position:sticky;top:0;z-index:100;gap:16px}
header .logo{font-family:'DM Serif Display',serif;font-size:16px;letter-spacing:1px;white-space:nowrap}
.nav{display:flex;gap:4px;flex:1}
.nav a{padding:8px 16px;font-size:12px;font-weight:600;color:#888;cursor:pointer;border-radius:8px;white-space:nowrap;transition:all .15s}
.nav a:hover{color:#fff;background:rgba(255,255,255,.08)}
.nav a.act{color:#fff;background:#c97b5a}
.dl-btn{padding:8px 16px;font-size:11px;font-weight:700;background:#fff;color:#1a1a1a;border:none;border-radius:8px;cursor:pointer;white-space:nowrap}
.dl-btn:hover{background:#eee}
.wrap{max-width:900px;margin:0 auto;padding:24px 20px}
.flow-section{margin-bottom:16px}
.flow-header{display:flex;align-items:center;gap:10px;padding:14px 18px;background:#fff;border-radius:12px;border:1px solid #e8e4df;cursor:pointer;user-select:none;transition:all .15s}
.flow-header:hover{border-color:#c97b5a;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.flow-header.open{border-radius:12px 12px 0 0;border-bottom:1px solid #f0ece7}
.flow-header h3{font-size:14px;font-weight:700;flex:1;margin:0}
.flow-count{font-size:10px;color:#999;font-weight:600}
.chv{font-size:10px;color:#bbb;transition:transform .2s;display:inline-block}
.chv.o{transform:rotate(90deg)}
.flow-body{background:#fff;border:1px solid #e8e4df;border-top:none;border-radius:0 0 12px 12px;padding:4px 0}
.email-card{border-bottom:1px solid #f5f2ee}
.email-card:last-child{border-bottom:none}
.email-hdr{padding:12px 18px;cursor:pointer;display:flex;align-items:center;gap:10px;user-select:none;transition:background .15s}
.email-hdr:hover{background:#faf8f5}
.email-hdr .eid{font-family:monospace;font-size:10px;color:#bbb;min-width:50px}
.email-hdr .etitle{font-size:13px;font-weight:600;flex:1}
.email-hdr .ech{font-size:9px;color:#999;background:#f5f2ee;padding:3px 8px;border-radius:4px}
.email-detail{padding:0 18px 18px;border-top:1px solid #f5f2ee}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}
.meta-label{font-size:8px;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.meta-val{font-size:12px;color:#1a1a1a}
.meta-val.italic{font-style:italic;color:#999;font-size:11px}
.copy-box{background:#faf8f5;border-radius:10px;padding:16px 18px;border:1px solid #f0ece7;margin-bottom:10px}
.copy-label{font-size:8px;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.copy-text{font-size:12px;color:#333;line-height:1.75;white-space:pre-wrap;word-wrap:break-word}
.sms-box{background:#fef9f0;border-radius:10px;padding:12px 16px;border:1px solid #f5ecd8;margin-bottom:10px}
.sms-label{font-size:8px;font-weight:700;color:#b8860b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.sms-text{font-size:11px;color:#8b6914;line-height:1.5}
.comment-box{background:#fff8e8;border:1px solid #f5ecd0;border-radius:10px;padding:12px 16px;margin-top:10px}
.comment-label{font-size:8px;font-weight:700;color:#b8860b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.comment-text{font-size:11px;color:#8b6914;line-height:1.5}
.comment-input{margin-top:10px}
.comment-input textarea{width:100%;padding:10px 14px;border:1px solid #f0ece7;border-radius:10px;font-size:11px;font-family:'DM Sans',system-ui,sans-serif;min-height:60px;resize:vertical;outline:none;background:#faf8f5}
.comment-input textarea:focus{border-color:#c97b5a}
.btn-row{display:flex;gap:6px;margin-top:8px}
.btn-save{padding:6px 14px;border:none;border-radius:8px;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;background:#1a1a1a;color:#fff}
.btn-del{padding:6px 14px;border:1px solid #fce4e4;border-radius:8px;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;background:#fff;color:#c44}
.btn-cancel{padding:6px 14px;border:1px solid #e8e4df;border-radius:8px;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;background:#fff;color:#999}
.btn-add-comment{font-size:10px;padding:6px 14px;border:1px solid #e8e4df;border-radius:8px;background:#fff;color:#999;cursor:pointer;font-family:inherit;margin-top:10px}
.btn-add-comment:hover{border-color:#c97b5a;color:#c97b5a}
.status-section{background:#fff;border-radius:12px;border:1px solid #e8e4df;margin-bottom:14px;overflow:hidden}
.status-header{padding:14px 18px;background:#faf8f5;border-bottom:1px solid #f0ece7;cursor:pointer;display:flex;align-items:center;gap:10px}
.status-header h3{font-size:13px;font-weight:700;flex:1;margin:0}
.status-row{display:grid;grid-template-columns:60px 1fr 90px 90px 36px;gap:8px;align-items:center;padding:8px 18px;font-size:12px;border-bottom:1px solid #f8f6f3}
.status-row:last-child{border-bottom:none}
.status-row:hover{background:#faf8f5}
.status-row .sid{font-family:monospace;font-size:10px;color:#bbb}
.status-row .stitle{font-weight:500}
.pill{display:inline-block;font-size:9px;padding:3px 8px;border-radius:5px;font-weight:600;letter-spacing:.3px}
.s-live{background:#ecfdf5;color:#065f46}
.s-approved{background:#eff6ff;color:#1e40af}
.s-todo{background:#f5f3ff;color:#4338ca}
.s-review{background:#fefce8;color:#854d0e}
.s-blocked{background:#fef2f2;color:#991b1b}
.s-cut{background:#f1f5f9;color:#64748b}
select.status-sel{font-family:inherit;font-size:10px;padding:4px 6px;border:1px solid #e8e4df;border-radius:6px;background:#fff;color:#1a1a1a;cursor:pointer;outline:none}
select.status-sel:focus{border-color:#c97b5a}
.note-btn{font-size:12px;cursor:pointer;color:#bbb;width:28px;text-align:center;border-radius:6px}
.note-btn:hover{color:#c97b5a;background:#faf8f5}
.note-text{padding:2px 18px 8px 86px;font-size:10px;color:#c97b5a;font-style:italic}
.note-input{margin:4px 18px 8px 86px;display:flex;gap:6px}
.note-input input{flex:1;padding:6px 12px;border:1px solid #e8e4df;border-radius:8px;font-size:11px;font-family:inherit;outline:none}
.note-input input:focus{border-color:#c97b5a}
.summary-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;padding:14px 18px;background:#fff;border-radius:12px;border:1px solid #e8e4df}
.summary-item{text-align:center;padding:4px 12px}
.summary-item .sn{font-size:20px;font-weight:700}
.summary-item .sl{font-size:9px;color:#999;text-transform:uppercase;font-weight:600;letter-spacing:.3px}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.fb{padding:6px 14px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid #e8e4df;background:#fff;color:#999}
.fb:hover{background:#faf8f5}
.fb.a{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.status-hdr{display:grid;grid-template-columns:60px 1fr 90px 90px 36px;gap:8px;padding:6px 18px;font-size:9px;color:#bbb;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
@media(max-width:700px){.status-row,.status-hdr{grid-template-columns:40px 1fr 70px 70px 28px;font-size:11px}.meta-grid{grid-template-columns:1fr}.nav a{font-size:10px;padding:6px 10px}}
</style>
</head>
<body>
<div class="pw-gate" id="pwGate"><div class="pw-box"><div class="logo">TMRW</div><div class="sub">Email Portal</div><input type="password" id="pwInput" placeholder="Enter password" autocomplete="off" autofocus><button onclick="checkPw()">Enter</button><div class="pw-err" id="pwErr">Incorrect password</div></div></div>
<div id="mainContent" class="hidden">
<header><span class="logo">TMRW</span><div class="nav" id="nav"></div><button class="dl-btn" onclick="downloadCSV()">Download CSV</button></header>
<div class="wrap" id="content"></div>
</div>
<script>
const flows=[
    {name:"Waitlist & Pre-Registration (8 emails)",tag:"tegan",emails:[
      {id:"0.1",trigger:"Waitlist signup. Immediate.",t:"Waitlist Signup Confirmation",sub:"You're on the list. Here's what that means.",from:"Mark Britt, CEO",ch:"Email + SMS",body:"You're on the TMRW waitlist, and I wanted to say thanks personally for putting your hand up.\n\nWe keep our early member group intentionally small so every person gets the clinical depth and attention this process deserves. That's not a process you rush, and it's not one that works at scale.\n\nWhen your spot opens, here's what you're stepping into: a complete map of your biology, up to 1,700+ data points, a personalised plan built by a real doctor and health coach, and supplements compounded specifically for your biology. Then a retest every four months, so the findings build on each other over time.\n\nWhen a spot opens, you'll hear from us directly. You'll have 48 hours to confirm, and from there your journey starts.\n\nWhile you wait, if something brought you here that you want to talk through, hit reply. I read these.\n\nHere's to more good tomorrows, strung together.\n\nMark Britt\nCEO, TMRW",sms:"Hi, you're officially on the TMRW waitlist. When your spot opens, you'll be the first to know. Good things coming."},
      {id:"0.2",trigger:"Waitlist signup + 3d",t:"Nurture: What TMRW Actually Does",sub:"Most people wait. You didn't.",from:"Mark Britt, CEO",ch:"Email",body:"The health system was built to react. You feel something, you book an appointment, someone investigates. That's the model, and for most people, it's the only model they've ever known.\n\nIt means most people's relationship with their own health is defined by whatever has gone wrong recently, or loudly enough to demand attention. Not by understanding. Not by where things are heading.\n\nYou put your hand up before that happened. That's not a small thing.\n\nWhat you're waiting for isn't a test. It's a different starting point, one that begins with understanding what's going on in your biology before something forces the conversation. The goal isn't to find problems. It's to understand your body well enough that fewer things become problems at all.\n\nThat's what TMRW was built for. And it's what your spot is waiting to give you.\n\nMark Britt\nCEO, TMRW"},
      {id:"0.3",trigger:"Waitlist signup + 7d",t:"Nurture: Proof It Works",sub:"TBD",from:"The TMRW Team",ch:"Email",body:"[IN REVIEW \u2014 PENDING STORY]\n\nAwaiting a confirmed member story from the wider team. A specific finding with a specific outcome is required. Brief is ready. Copy to follow once story is confirmed."},
      {id:"0.4",trigger:"5 days before spot opens",t:"Your Spot Is Coming",sub:"Your spot opens in five days.",from:"The TMRW Team",ch:"Email + SMS",body:"Something is about to change.\n\nYour TMRW spot opens on {{date}}.\n\nWhen you joined the waitlist, you made a decision most people never get around to. That's worth remembering as the moment gets closer.\n\nYour invitation will arrive on {{date}}. When it does, everything you've been waiting for starts from there.\n\nThe TMRW Team",sms:"Something is about to change. Your TMRW spot opens on {{date}}. Keep an eye on your inbox, your invitation lands that day."},
      {id:"0.5",trigger:"Spot opens. Immediate.",t:"Your Spot Is Ready",sub:"Your spot is ready.",from:"The TMRW Team",ch:"Email + SMS",body:"Your spot is ready. This is your invitation to join TMRW.\n\nWhen you register, your at-home epigenetic testing kit ships within 48 hours. Your first step from there is your Health Story. It's how your clinical team gets to know you, and it's what sets everything in motion.\n\nOnce your Health Story is complete, your clinical team starts building your picture: your biology, your history, what's actually going on. Your first Customised Pod formula is created and shipped to you within days. As your blood and epigenetic results come in, your formula upgrades automatically. You retest 4 times a year, and it keeps getting more precise.\n\nUse code {{code}} to register. Your spot is held for 48 hours.\n\nYou're helping us build something worth building. We're glad you're in.\n\n[CLAIM YOUR SPOT]\n\nIf anything isn't clear before you register, reply here.\n\nThe TMRW Team",sms:"Your TMRW spot is ready. Use code {{code}} to register. Your spot is held for 48 hours. {{link}}"},
      {id:"0.6",trigger:"Spot open + 24h (expiry warning)",t:"Your Spot Expires Tomorrow",sub:"Your spot expires tomorrow.",from:"The TMRW Team",ch:"Email + SMS",body:"Your TMRW spot expires tomorrow. After that it goes to the next person on the waitlist and we can't hold it further.\n\nYou waited for this spot. Whatever brought you to TMRW in the first place is still true today.\n\nIf something is holding you back, get in touch before your window closes. If life just got in the way, now is the moment.\n\nUse code {{code}} to register before your spot closes.\n\n[CLAIM YOUR SPOT NOW]\n\nThe TMRW Team",sms:"Your TMRW spot expires tomorrow. Use code {{code}} to register before it closes. {{link}}"},
      {id:"0.7",trigger:"Spot expired. Immediate.",t:"One Question Before You Go",sub:"Did we get the timing wrong?",from:"The TMRW Team",ch:"Email + SMS",body:"Unfortunately, your TMRW spot has closed, and we won't pretend otherwise.\n\nWe should have another one open up later in the month, and we'll be back in touch when it does. But in the meantime, we wanted to ask one thing.\n\nWas it timing? Something you weren't sure about? Or has life just been a lot lately?\n\nIf any of those are true, reply here and let us know. We'll find a way to get you in when you're ready.\n\nThe TMRW Team",sms:"Your TMRW spot closed but we'd love to know why. If the timing wasn't right or something held you back, get in touch at info@startmytomorrow.com"},
      {id:"0.8",trigger:"Waitlist signup + 90d, never invited or lapsed",t:"Reengagement (Lapsed Waitlist)",sub:"We owe you an update.",from:"Mark Britt, CEO",ch:"Email + SMS",body:"You joined the TMRW waitlist a few months ago, and we haven't been in touch since. That's on us, and I wanted to change that.\n\nWe've been building carefully. Keeping the member group small so every person gets the clinical depth this process deserves. Your place on the list has been held throughout.\n\nYour spot is getting closer. When it opens, you'll hear from us with everything you need to get started.\n\nWhat you're stepping into when that arrives: a complete map of your biology across 1,700+ data points, a personalised plan built by a real doctor and health coach, and supplements compounded specifically to what your results show. Then a retest every four months, so the findings build on each other over time.\n\nIf anything has changed since you signed up, or you have questions before your invitation arrives, reply here. I read these.\n\nHere's to more good tomorrows, strung together.\n\nMark Britt\nCEO, TMRW",sms:"Hey, it's TMRW. You're still on the waitlist and your place has been held. We'll be in touch when your spot opens. Good things are coming."},
    ]},
    {name:"Registration & Checkout (10 emails)",tag:"tegan",emails:[
      {id:"1.1",trigger:"Registration complete. Immediate.",t:"Welcome Email",sub:"Your TMRW membership is active",from:"The TMRW Team",ch:"Email + SMS",body:"Hey {{customer.first_name}},\n\nYou're in. Your TMRW membership is active.\n\nYour Little Prick Test will ship within 48 business hours, and you'll get tracking the moment it does.\n\nThe first thing to do from your side is your Health Story. It's where you tell us the things your biology can't: your background, your concerns, what you're hoping to get out of this. It's also what sets everything in motion. Nothing starts until it's done, and everything starts once it is.\n\nYour blood test requisition gets prepared. Your first Customised Pod formula gets created and shipped to you within days, 30 clinically selected ingredients based on your profile. And as your blood and epigenetic results come in, your formula gets more precise.\n\nAll of that begins with your Health Story.\n\n[START MY HEALTH STORY]\n\nWhen your Little Prick Test arrives, you'll find everything you need to collect your sample inside, along with a prepaid return envelope.\n\nYour TMRW Team",sms:"Hey, it's TMRW. Your membership is active. Your first step is your Health Story, it's what sets everything in motion: {{Health Story Link}}"},
      {id:"1.1A",trigger:"Registration complete + 4h",t:"Mark CEO Welcome (+4h)",sub:"A quick note from Mark",from:"Mark Britt, CEO",ch:"Email",body:"Hey {{customer.first_name}},\n\nI wanted to say thank you, personally.\n\nTMRW Health exists because we believe people deserve real clarity about their bodies and the tools to actually do something with it. You clearly feel the same way, or you wouldn't be here.\n\nBehind the scenes, our clinical team talks about members every day. We pay attention to what's working, what's not, and how to make this sharper over time. You're part of that now.\n\nIf something specific brought you here, a goal, a question, something you've been putting off, hit reply and let us know. It helps your clinical team understand what matters to you.\n\nMark Britt\nCEO, TMRW Health"},
      {id:"1.3",trigger:"Cart abandoned + 1h",t:"Cart Abandon Step 1 (+1h)",sub:"You didn't finish",from:"The TMRW Team",ch:"Email",body:"Hey {{customer.first_name}},\n\nYou started registering with TMRW but didn't finish. Your spot is still open.\n\nWhen you complete your registration, your at-home testing kit ships within 48 hours and your clinical team starts assembling. Once you complete your Health Story, your first Customised Pod formula gets created and shipped to you within days, and it only gets more precise from there as your results come in.\n\n[COMPLETE MY REGISTRATION]\n\nIf something got in the way, or you had a question you couldn't find the answer to, hit reply.\n\nYour TMRW Team"},
      {id:"1.4",trigger:"Cart abandoned + 24h",t:"Cart Abandon Step 2 (+24h)",sub:"Your spot is still open",from:"The TMRW Team",ch:"Email",body:"Hey {{customer.first_name}},\n\nYou started your TMRW registration yesterday but didn't finish.\n\nWhatever brought you here is still true today. The question you had about your health, the thing you've been wanting to understand, the feeling that something could be better. That doesn't go away because life got busy.\n\nYour spot is still open.\n\n[COMPLETE MY REGISTRATION]\n\nYour TMRW Team"},
      {id:"1.5",trigger:"Cart abandoned + 72h",t:"Cart Abandon Step 3 (+72h)",sub:"Why most members say they wish they'd started sooner",from:"The TMRW Team",ch:"Email",body:"Hey {{customer.first_name}},\n\nMost members don't say they wish they'd started sooner because of a specific result. They say it because of how it felt to finally understand what was going on inside their body. Not guessing. Not wondering. Knowing.\n\nYour registration is still open.\n\n[COMPLETE MY REGISTRATION]\n\nYour TMRW Team"},
      {id:"1.6",trigger:"Cart abandoned + 7d",t:"Cart Abandon Step 4 (+7d)",sub:"Is something holding you back?",from:"The TMRW Team",ch:"Email",body:"Hey {{customer.first_name}},\n\nIt's been about a week since you started registering with TMRW, and we wanted to reach out one more time.\n\nIf something is holding you back, we'd genuinely like to know what it is. Whether it's the cost, the time commitment, not being sure if it's right for you, or just not understanding how it works. Those are all fair questions and we'd rather answer them than let you walk away wondering.\n\nHit reply and tell us what's on your mind. A real person will get back to you.\n\nYour TMRW Team"},
      {id:"PAY-1",trigger:"Payment failed. Immediate.",t:"Payment Failed",sub:"Your payment didn't go through",from:"The TMRW Team",ch:"Email",body:"Hey {{customer.first_name}},\n\nWe tried to process your payment but it didn't go through. To keep your membership active, update your payment details here:\n\n[UPDATE PAYMENT]\n\nIf you've already sorted it or your bank flagged it by mistake, we'll retry automatically. If something else is going on, just hit reply.\n\nYour TMRW Team"},
      {id:"PAY-2",trigger:"Payment failed + 48h",t:"Payment Reminder (+48h)",sub:"Your payment still needs updating",from:"The TMRW Team",ch:"Email + SMS",body:"Hey {{customer.first_name}},\n\nWe sent a note a couple of days ago about your payment not going through. It still hasn't been resolved.\n\nIf we're not able to process a valid payment in the next few days, we'll need to pause your membership. That means your clinical team won't be able to continue working on your plan, and your dashboard access will be suspended.\n\n[UPDATE PAYMENT]\n\nIf there's a reason you haven't been able to update it, or you want to talk through your options, hit reply.\n\nYour TMRW Team",sms:"Hey, it's TMRW. Your payment still needs updating. You can sort it here: {{payment_link}}"},
      {id:"PAY-3",trigger:"Payment failed + 7d",t:"Membership Paused (+7d)",sub:"Your membership has been paused",from:"The TMRW Team",ch:"Email + SMS",body:"Hey {{customer.first_name}},\n\nWe've been trying to process your payment for the past week but haven't been able to get it through. Your membership has been paused.\n\nYour dashboard and health data are still there. Nothing has been deleted. But your clinical team can't continue working on your plan until your payment is resolved.\n\n[REACTIVATE MY MEMBERSHIP]\n\nIf you want to come back, it's one click. If something else is going on, hit reply and we'll work it out.\n\nYour TMRW Team",sms:"Hey, it's TMRW. Your membership has been paused. Reactivate here: {{payment_link}}"},
      {id:"PAY-4",trigger:"Subscription renewal processed. Immediate.",t:"Subscription Renewal Confirmation",sub:"Your membership has renewed",from:"The TMRW Team",ch:"Email",body:"Hey {{customer.first_name}},\n\nYour TMRW membership has renewed and your payment of {{trigger.amount}} has been processed.\n\nYour clinical team continues to work on your plan, and your dashboard is always there when you want to check in on your progress.\n\nIf you have any questions about your membership or billing, just hit reply.\n\nYour TMRW Team"},
    ]},
    {name:"Onboarding Flow (7 emails)",tag:"tegan",emails:[
      {id:"OB-2",trigger:"Clinical team assigned. Immediate.",t:"Your Clinical Team",sub:"Your clinical team is on it",from:"The TMRW Team",ch:"Email",body:"Hi {{first_name}},\n\nYour TMRW clinical team has been assigned.\n\nThis isn't one person. It's a cross-functional clinical team working on your biology. They'll be reviewing your blood requisition, your clinical pathways, and formulating your pod formula, starting with your Customised Pods and refining it as your blood and epigenetic data come in.\n\nThey'll be reviewing your Health Story as soon as you complete it. The more you share in there, the more they have to work with.\n\nIf you haven't started it yet:\n\n[START MY HEALTH STORY]\n\nThe TMRW Team"},
      {id:"OB-3",trigger:"Health Story completed. Immediate.",t:"Health Story Complete \u2014 Everything Starts Now",sub:"You just set everything in motion",from:"The TMRW Team",ch:"Email + SMS",body:"Hi {{first_name}},\n\nYour Health Story is complete. Things are already moving.\n\nYour blood test requisition is being reviewed and prepared. You'll have it within 48 hours.\n\nYour Customised Pod formula is being created. That's 30 clinically selected ingredients based on what you shared, personalised to your profile. They'll ship within days. This is the first version of your formula. Once your blood results come in, it upgrades to your Personalised Pods. And when your full epigenetic data arrives, it evolves again into your Precision Pods, compounded from 107+ ingredients. The more data we have, the more precise it gets.\n\nAll of that started because of what you just completed.\n\nIf you'd like to talk through your goals or have questions about what's next, you can book a Welcome Call with your clinical team. It's 30 to 45 minutes, completely optional, and covers your Health Story, your goals, and a preview of what's coming.\n\n[BOOK A WELCOME CALL]\n\nYour blood requisition and Customised Pods are being prepared regardless.\n\nThe TMRW Team",sms:"Hey, it's TMRW. Your Health Story is complete. Your blood requisition and Customised Pods are in progress. We'll be in touch."},
      {id:"OB-4",trigger:"Health Story completed + 48h, call not booked",t:"Welcome Call Invitation (optional)",sub:"Want to talk through your plan?",from:"The TMRW Team",ch:"Email",body:"Hi {{first_name}},\n\nYour clinical team is already working on your blood requisition and your Customised Pods. That's all in progress.\n\nIf you'd like to sit down with your clinical team, your Welcome Call is a good chance to do it. It's 30 to 45 minutes where you can review your Health Story together, set your health goals, and get a preview of what's coming as your data deepens.\n\nIt's optional. Nothing is waiting on it. But members who do it tend to feel more grounded in their plan from the start.\n\n[BOOK MY WELCOME CALL]\n\nAnd if you'd rather skip it and wait for your results, that's completely fine too.\n\nThe TMRW Team"},
      {id:"OB-5",trigger:"Welcome Call booked. Immediate.",t:"Welcome Call Confirmed",sub:"Your Welcome Call is booked",from:"The TMRW Team",ch:"Email",body:"Hi {{first_name}},\n\nYour Welcome Call is confirmed.\n\nDate: {{call_date}}\nTime: {{call_time}}\nDuration: 30 to 45 minutes\nJoin here: {{call_link}}\n\nYour clinical team will walk through your Health Story, talk about your health goals, and give you a preview of what's coming as your results come in.\n\nCome with whatever's on your mind. That's what the call is for.\n\nThe TMRW Team"},
      {id:"OB-6",trigger:"Morning of Welcome Call",t:"Welcome Call Day-Of Reminder",sub:"Your Welcome Call is today",from:"The TMRW Team",ch:"Email + SMS",body:"Hi {{first_name}},\n\nQuick reminder that your Welcome Call is today.\n\nTime: {{call_time}}\nJoin here: {{call_link}}\n\nYour clinical team will be ready for you. If you need to reschedule, just hit reply.\n\nThe TMRW Team",sms:"Hey, it's TMRW. Your Welcome Call is today at {{call_time}}. Join here: {{call_link}}"},
      {id:"OB-7",trigger:"+1h after Welcome Call, member did not join",t:"Welcome Call No-Show",sub:"We missed you today",from:"The TMRW Team",ch:"Email",body:"Hi {{first_name}},\n\nLooks like we missed you on your Welcome Call today. No worries at all.\n\nYour blood requisition and Customised Pods are still being prepared. Nothing has paused.\n\nIf you'd like to rebook:\n\n[REBOOK MY WELCOME CALL]\n\nAnd if you'd rather skip it and wait for your results, that's fine too. Your clinical team is working on your plan either way.\n\nThe TMRW Team"},
    ]},
    {name:"Health Story Flow (8 emails)",tag:"tegan",emails:[
      {id:"HS-0A",trigger:"Registration complete + 24h, Health Story not started",t:"Get Started",sub:"One thing to do to get started",from:"The TMRW Team",ch:"Email + SMS",body:"Hi {{first_name}},\n\nYour TMRW journey starts with your Health Story. It's a comprehensive form that tells your clinical team who you are, what's been going on for you, and where you want to focus.\n\nOnce it's done, everything unlocks. Your personalised blood test is prepared, and your Customised Pod formula moves into creation. Nothing can start without it.\n\nTake your time with it and don't hold back. The more thorough you are, the better your plan will be.\n\n[START MY HEALTH STORY]\n\nThe TMRW Team",sms:"Your TMRW journey starts with your Health Story. Once it's done, your clinical plan, Customised Pod formula, and blood test can begin: {{Health Story Link}}"},
      {id:"HS-0B",trigger:"Registration complete + 48h, Health Story not started",t:"Still Haven't Started (+48h)",sub:"Your clinical team is waiting to meet you",from:"The TMRW Team",ch:"Email",body:"Hi {{first_name}},\n\nYour clinical team is ready to get to work, but they need to know who you are first. That's what your Health Story is for.\n\nIt's how your clinical team gets to know you. The more you tell them, the more specific your plan, your Customised Pod formula, and your blood test will be.\n\nEverything can begin once it's done.\n\n[START MY HEALTH STORY]\n\nIf something's getting in the way, just hit reply. We're here.\n\nThe TMRW Team"},
      {id:"HS-0C",trigger:"Registration complete + 7d, Health Story not started",t:"One Week Follow-Up",sub:"We don't want to start without you",from:"The TMRW Team",ch:"Email",body:"Hi {{first_name}},\n\nWe know life gets busy. But we wanted to reach out one more time, because your clinical team is ready and everything that comes next depends on your Health Story.\n\nYour clinical plan, your Customised Pod formula, your blood test. They're all built around what you tell us. The more you share, the more personalised they'll be.\n\nEverything is saved as you go, so you can do it in one sitting or come back to it.\n\n[START MY HEALTH STORY]\n\nIf you're unsure about anything, or if something's been holding you back, just hit reply. We'd genuinely like to help.\n\nThe TMRW Team"},
      {id:"HS-1",trigger:"Health Story started but left incomplete",t:"Gentle Nudge (started, left)",sub:"Your Health Story unlocks everything",from:"The TMRW Team",ch:"Email + SMS",body:"Hi {{first_name}},\n\nYou started your Health Story, and it's saved and waiting for you.\n\nYour Health Story is what unlocks everything that comes next. Once it's complete, your clinical team can start building your plan, your Customised Pod formula can be created to your biology, and your blood test can be ordered.\n\nIt's also what makes all of that personal. Without it, your results are just numbers. With it, your team can build something that actually reflects what's going on inside your body.\n\nAnd don't be afraid to go into detail. The more your team knows, the more precise everything that follows will be.\n\n[CONTINUE MY HEALTH STORY]\n\nThe TMRW Team",sms:"Hey, it's TMRW. Your Health Story is what makes your better TMRW plan yours. Your clinical plan, Customised Pod formula, and blood test are all waiting on the other side: {{Health Story Link}}"},
      {id:"HS-2",trigger:"Health Story under 50% complete",t:"Progress Nudge (under 50%)",sub:"The best parts of your Health Story are still ahead",from:"The TMRW Team",ch:"Email",body:"Hi {{first_name}},\n\nYou've made a start on your Health Story. Everything so far is saved.\n\nThe sections still to go are the ones that matter most. They're the context that turns your data into something genuinely useful. It's what lets your clinical team look at your results and understand not just what the numbers say, but what they mean for you.\n\nIf something feels relevant, it probably is. The richer the picture you give your team, the more tailored your plan and your Customised Pod formula will be.\n\nOnce it's done, your clinical plan, Customised Pod formula, and blood test can all begin.\n\n[CONTINUE MY HEALTH STORY]\n\nThe TMRW Team"},
      {id:"HS-3",trigger:"Health Story over 50% complete",t:"Nearly There (over 50%)",sub:"Almost done. Your Customised Pod formula is waiting.",from:"The TMRW Team",ch:"Email",body:"Hi {{first_name}},\n\nYou're over halfway through your Health Story. The hard part is behind you.\n\nJust a few more sections and your clinical team will have the full picture. That means a plan built around your biology, not a template. A Customised Pod formula created for what your body actually needs, not a generic supplement. A blood test ordered based on what matters for you specifically.\n\nEverything you've shared so far is saved. Pick up right where you left off.\n\n[FINISH MY HEALTH STORY]\n\nThe TMRW Team"},
      {id:"HS-4",trigger:"Health Story incomplete + 5d",t:"Final Nudge (+5 days)",sub:"Your clinical team is ready when you are",from:"The TMRW Team",ch:"Email + SMS",body:"Hi {{first_name}},\n\nYour clinical team is ready to start working on your plan. Your Customised Pod formula is ready to be created. Your blood test is ready to be ordered. The one thing they're all waiting on is your Health Story.\n\nWe could start without it. But we won't. Because without your Health Story, your team would be interpreting your results without the full picture of what's been going on for you and what actually matters to you. And that's not how this should work. You came to TMRW for something more personal than that.\n\nEverything you've entered so far is saved. You can pick up where you left off anytime.\n\n[COMPLETE MY HEALTH STORY]\n\nIf something's getting in the way, or you'd rather talk through it with someone, just hit reply. We're here.\n\nThe TMRW Team",sms:"Hey, it's TMRW. Your clinical team is ready to start but they're waiting on your Health Story. It's the one thing between you and your plan. Pick up where you left off: {{Health Story Link}}"},
      {id:"HS-5",trigger:"Health Story submission failed (technical error)",t:"Technical Failure",sub:"Your Health Story didn't submit properly",from:"The TMRW Team",ch:"Email",body:"Hi {{first_name}},\n\nIt looks like something went wrong when you tried to submit your Health Story. Don't worry, all your answers are saved.\n\nJust head back in and hit submit again. It should only take a moment. Once it's through, your clinical team can start building your plan, your Customised Pod formula can be created, and your blood test can be ordered. You were right there.\n\n[SUBMIT MY HEALTH STORY]\n\nIf it's still not working, hit reply and we'll sort it out for you.\n\nThe TMRW Team"},
    ]},
    {name:"Kit Fulfillment (8 emails)",tag:"tegan",emails:[
      {id:"3.1",trigger:"Kit shipped. Immediate.",t:"Kit Shipped + Prep",sub:"Your Little Prick Test has shipped",from:"The TMRW Team",ch:"Email + SMS",body:"Hey {{customer.first_name}},\n\nYour Little Prick Test has shipped. It should arrive within 1 to 3 business days.\n\nTracking: Australia Post \u2014 {{event.tracking_number}}\n\nBefore you collect, fast for 8 hours (water is fine) and try to collect within 2 hours of waking. Morning is best. Drink plenty of water the day before.\n\nWhen it arrives, register your kit at app.startmytomorrow.com, then follow the instructions inside. Let the card dry properly before sealing and drop it at any post office within 48 hours using the prepaid satchel.\n\nYour TMRW Team",sms:"Hey, it's TMRW. Your Little Prick Test has shipped. Should arrive within 1 to 3 business days. Tracking: {{event.tracking_number}}"},
      {id:"3.2",trigger:"Kit delivered (carrier confirmation). Immediate.",t:"Kit Delivered",sub:"Your Little Prick Test has been delivered",from:"The TMRW Team",ch:"Email",body:"Hey {{customer.first_name}},\n\nYour Little Prick Test has been delivered.\n\nBefore you collect, fast for 8 hours beforehand (water is fine), collect within 2 hours of waking, and morning gives the best results. Everything you need is inside the kit, and there's a QR code that walks you through the full collection process.\n\nThe first step is registering your kit so the lab can match your sample to your account.\n\n[REGISTER MY KIT]\n\nYour TMRW Team"},
      {id:"3.3",trigger:"Kit delivered + 3d, not registered",t:"Register Your Kit (+3d)",sub:"Your Little Prick Test needs registering",from:"The TMRW Team",ch:"Email + SMS",body:"Hey {{customer.first_name}},\n\nYour Little Prick Test was delivered a few days ago but hasn't been registered yet.\n\nRegistration links your sample to your account so the lab knows it's yours. It takes about 30 seconds: {{trigger.register_url}}\n\nIf you've already collected and posted your sample, it's worth registering now so everything's ready when it arrives.\n\nYour TMRW Team",sms:"Hey, it's TMRW. Your Little Prick Test still needs registering. Takes 30 seconds: {{register_url}}"},
      {id:"3.6",trigger:"Kit delivered + 10d, sample not received",t:"Sample Not Received (+10d)",sub:"We haven't received your sample yet",from:"The TMRW Team",ch:"Email",body:"Hey {{customer.first_name}},\n\nWe haven't received your Little Prick Test sample yet.\n\nIf you haven't collected it, the prep is straightforward: fast for 8 hours, collect within 2 hours of waking, and scan the QR code in your kit for the full walkthrough.\n\nIf you've already posted it, it may still be in transit. Australia Post can take 2 to 3 business days. We'll let you know as soon as it reaches the lab.\n\nAny trouble? Reply here.\n\nYour TMRW Team"},
      {id:"3.7",trigger:"Kit delivered + 21d, sample not received",t:"Last Automated Push (+21d)",sub:"Your Little Prick Test is still waiting",from:"The TMRW Team",ch:"Email + SMS",body:"Hey {{customer.first_name}},\n\nYour Little Prick Test arrived a while ago, but we haven't received your sample yet.\n\nIf you haven't had a chance to collect, the process is straightforward. Fast for 8 hours, collect within 2 hours of waking, follow the steps in your kit, and post it back using the prepaid satchel.\n\nIf your kit never arrived, got damaged, or something else got in the way, hit reply and we'll sort it out.\n\nYour TMRW Team",sms:"Hey, it's TMRW. We still haven't received your sample. If something got in the way, hit reply to your email and let us know."},
      {id:"3.2B",trigger:"Sample posted by member. Immediate.",t:"Sample on Its Way",sub:"Your sample is on its way",from:"The TMRW Team",ch:"Email",body:"Hey {{customer.first_name}},\n\nYour sample is on its way. Transit to the lab typically takes 2 to 3 business days. Once it arrives, we'll let you know and the full analysis begins from there.\n\nNothing you need to do on your end. We'll keep you posted.\n\nYour TMRW Team"},
      {id:"3.12",trigger:"QC pass at TMRW office. Immediate.",t:"QC Pass \u2014 Shipped to Lab",sub:"Your sample passed quality checks",from:"The TMRW Team",ch:"Email",body:"Hey {{customer.first_name}},\n\nYour Little Prick Test sample passed our quality checks and is on its way to our partner lab.\n\nTransit typically takes 4 to 5 business days. Once it arrives, the full analysis begins. We'll keep you posted at each stage.\n\nYour TMRW Team"},
      {id:"3.11",trigger:"QC fail at TMRW office (qc_fail_internal). Immediate.",t:"QC Fail at TMRW Office",sub:"Your Little Prick Test Update",from:"The TMRW Team",ch:"Email + SMS",body:"[See separate QC Fail document for full copy]\n\nOne job: Take complete ownership. The member must not feel like they failed. Fresh kit on the way, on us."},
    ]},
    {name:"Blood Test Flow (3 emails)",tag:"tegan",emails:[
      {id:"BT-1",trigger:"VA moves member to 'Requisition Sent' in pipeline. Immediate.",t:"Requisition Sent",sub:"Your blood test requisition is ready",preview:"Here's how to prepare and where to go.",from:"The TMRW Team",ch:"Email + SMS",body:"Hi {{first_name}},\n\nYour blood test requisition has been sent through. You'll receive a barcode via SMS from Douglass Hanly Moir Pathology. You can take this to any pathology collection centre near you. To access your request form outside of DHM, enter your date of birth and you'll get your form to take to any lab.\n\nWhen you arrive, scan your barcode at the front desk and they'll take it from there.\n\nFast for a minimum of 8 hours beforehand and try to get to the collection centre before 10am. Bring your barcode (printed or on your phone), your Medicare card, and a photo ID.\n\nIf your clinical team has flagged any specific prep for your test, those instructions will be on your requisition.\n\nOnce your bloods are done, your results come through to us directly. When they do, your clinical team reviews them and your Customised Pod formula upgrades to your Personalised Pods, refined from 30 to 70 ingredients based on what your blood panel shows.\n\nThat's it. Once your bloods are done, hit reply and let us know.\n\nThe TMRW Team\n\nDisclaimer: Most blood tests are bulk billed. Depending on the markers requested, the lab may invoice for certain tests per Medicare guidelines. The lab will let you know at the time of collection.",sms:"Hey, it's TMRW. Your blood test requisition has been sent. You'll get a barcode from Douglass Hanly Moir Pathology. Take it to any pathology collection centre. Fast for a minimum of 8 hours and try to go before 10am. Check your email for the full details."},
      {id:"BT-2",trigger:"5 business days (~7 calendar days) after BT-1",t:"Blood Test 5-Day Follow-Up",sub:"Have you had your blood test?",preview:"Just checking in.",from:"The TMRW Team",ch:"Email only",body:"Hi {{first_name}},\n\nWe sent your blood test requisition through a few days ago. Just checking in to see if you've had a chance to get it done.\n\nIf you have, hit reply and let us know. Your results will come through to us directly and we'll be in touch the moment they're in.\n\nIf you haven't got around to it yet, no stress. Take your barcode to any pathology center near you. Just remember to fast for minimum 8 hours and try to go before 10am. The sooner your bloods are done, the sooner your clinical team can get to work and your pod formula can upgrade.\n\nThe TMRW Team"},
      {id:"BT-3",trigger:"VA uploads results to Oracle, moves to 'Results Received'. Immediate.",t:"Blood Test Results Received",sub:"Your blood test results are in",preview:"Your clinical team is reviewing them now.",from:"The TMRW Team",ch:"Email + SMS",body:"Hi {{first_name}},\n\nYour blood test results have come through. Your clinical team is reviewing them now.\n\nThis is also when your pod formula evolves. Your Customised Pods were built from your Health Story. Now that your blood panel is in, your clinical team is refining your formula into your Personalised Pods, 70 ingredients tailored to what your biomarkers show. They'll ship once the review is done.\n\nNothing else you need to do on your end. We'll reach out when the review is complete.\n\nThe TMRW Team",sms:"Hey, it's TMRW. Your blood test results are in. Your clinical team is reviewing them now and your pod formula is being upgraded. We'll be in touch."},
    ]},
    {name:"Dead Zone Sequence (10 emails)",tag:"tegan",emails:[
      {id:"4.1",trigger:"sample_received_lab. Immediate.",t:"Sample Received at Lab",sub:"Your sample is at the lab",from:"The TMRW Team",ch:"Email + SMS",body:"Hi [first name],\n\nYour sample arrived safely at the lab this morning. Everything looks good, and analysis has begun.\n\nOver the next 3 to 4 weeks, your sample goes through a series of detailed analyses, from blood biomarker processing across 11 organ systems to mapping over 300,000 methylation markers across your genome. It's thorough work, and it takes time to do properly.\n\nOnce the lab work is complete, your clinical team here in Sydney will review everything alongside your Health Story before your results are released. We'll be in touch to arrange your results conversation once that review is done.\n\nYou won't hear silence from us during the wait. We'll check in regularly with updates on where things are at, and share a few things worth knowing before your results land.\n\nIf you have any questions in the meantime, reply to this email. A real person reads it.\n\nThe TMRW Team",sms:"TMRW: Your sample arrived safely at the lab. Analysis has begun. Results expected in 3 to 4 weeks. We'll keep you updated along the way."},
      {id:"4.1A",trigger:"sample_received + 3d",t:"Inside Scoop: Sleep (+3d)",sub:"[Uses existing Inside Scoop template EDM8]",from:"The TMRW Team",ch:"Email",body:"Uses Kareema's existing Inside Scoop sleep video email. Only the intro block changes.\n\nNEW INTRO BLOCK:\nYour sample has been at the lab for a few days now. Everything is progressing as expected, and we'll keep you updated along the way.\n\nWhile the lab does its work, we wanted to share something that will almost certainly come up when your results arrive. It's the single thing our clinical team recommends to almost every member. Sleep quality shows up in inflammatory markers, hormone regulation, and epigenetic age. It's worth paying attention to before your data arrives.\n\nNEW 'WHY THIS MATTERS' FIRST LINE:\nWe test hundreds of biomarkers at TMRW. Your results will show markers across 11 organ systems.\n\nNEW 'WHY THIS MATTERS' CLOSING LINE:\nYour results will help with that.\n\nNEW P.S.:\nP.S. Already sleeping well? That's a good sign for your results. If not, even small changes now will show up in your data at retest."},
      {id:"4.1B",trigger:"sample_received + 7d",t:"Inside Scoop: Brain Fog (+7d)",sub:"[Uses existing Inside Scoop template EDM10]",from:"The TMRW Team",ch:"Email",body:"Uses Kareema's existing Inside Scoop brain fog video email. Only the intro block changes.\n\nNEW INTRO BLOCK:\nYour sample is about a week into analysis. The lab is working through the detailed stuff, and we're on track.\n\nIn the meantime, if you've ever walked into a room and completely forgotten why you're there, or read the same sentence three times and still had no idea what it said, this one's for you. That's brain fog. And your brain isn't broken. It's sending signals that your results may help explain.\n\nNEW 'WHY THIS MATTERS' LAST THREE LINES:\nBut here's what most people don't realise. Most of these markers are measurable. Testable. Addressable. And they're exactly the kind of thing your results are designed to pick up. If brain fog has been part of your life, your clinical team will be looking at why.\n\nNEW 'YOUR BRAIN ISN'T BROKEN' SECOND HALF:\nWhen your results arrive, your clinical team will look at exactly these areas. In the meantime, the sleep habits from last week's email are one of the best things you can do for brain fog right now.\n\nNEW P.S.:\nP.S. Does this sound like you? Hit reply and tell us. Your clinical team reads these, and it helps them prepare for when your results are ready."},
      {id:"4.1C",trigger:"sample_received + 12d",t:"Results Almost Ready (+12d)",sub:"Your results are close. Here's what to expect.",from:"The TMRW Team",ch:"Email + SMS",body:"Hi [first name],\n\nYour analysis is moving into the final stages. We're expecting your results to be ready within the next week or so.\n\nBefore they arrive, we wanted to give you a sense of what the experience will feel like.\n\nWhen your results are ready, we'll email and text you. Your dashboard will be available straight away. Some members prefer to explore it on their own first. Others prefer to wait and go through it with their clinician for context. Either way works. The clinician conversation is where the findings come together with your Health Story, and most members say that's where things click.\n\nOne thing that helps: come with a question. Not a list of twenty. One question. The thing you most want to understand about your health right now. Your clinician will cover the important findings regardless, but having a clear question makes the conversation yours.\n\nIf your results show areas that need attention, that's not bad news. That's what you're paying for. Most health tests tell you you're fine and send you home. This one tells you what's actually going on, and then builds a plan around it.\n\nWe'll be in touch soon.\n\nThe TMRW Team",sms:"TMRW: Your results are nearly ready. We've sent you an email with what to expect when they arrive. Worth a read before your data lands."},
      {id:"4.1B-ii",trigger:"sample_received + 16d, results not ready",t:"Why Health Habits Fail (+16d)",sub:"[Uses existing Inside Scoop template]",from:"The TMRW Team",ch:"Email",body:"Uses Kareema's existing Inside Scoop health habits video email. Only the intro block changes.\n\nNEW INTRO BLOCK:\nYour results are in the final stages of analysis. We're getting close now, and we'll be in touch as soon as they're ready.\n\nWhen your results arrive, your clinical team will build your Better TMRW Plan. It will include things to change, things to start, and things to prioritise. Before that conversation happens, this is worth 5 minutes of your time. It's about why most health changes don't stick, and what to do about it.\n\nNEW 'WHY WE'RE SHARING THIS NOW':\nWe're sharing this now because your plan is almost here. And when it arrives, the members who get the most from it aren't the ones with the most willpower. They're the ones who understand how change actually works. Sabina's video gives you that foundation before your plan lands.\n\nNEW SIGN-OFF:\nNearly there. the TMRW team\n\nNEW P.S.:\nP.S. If this resonates, hit reply and tell us what you're most hoping your plan will help you change. Your clinical team reads these."},
      {id:"4.1D",trigger:"sample_received + 18d, results not ready",t:"Quick Check-in (+18d)",sub:"Quick update on your results",from:"The TMRW Team",ch:"Email",body:"Hi [first name],\n\nJust a short one. Your results are in the final stages of review with the lab. Once they're complete, your clinical team here in Sydney will review everything before we release them to you.\n\nWe're expecting to be in touch within the next few days.\n\nIf you haven't already, now is a good time to think about the one question you most want answered when your results arrive. It makes the conversation with your clinician sharper.\n\nNearly there.\n\nThe TMRW Team"},
      {id:"4.1E",trigger:"sample_received + 22d, results not ready",t:"Still With You (+22d)",sub:"Your results are taking a little longer. Here's what's happening.",from:"The TMRW Team",ch:"Email + SMS",body:"Hi [first name],\n\nYour results are taking a little longer than we'd like. The epigenetic analysis sometimes needs extra processing time to meet the quality thresholds we set, and we'd rather take the extra time than rush it.\n\nWhile the lab finishes up, your clinical team has been reviewing your Health Story and preparing for your results conversation. They're ready to move the moment your data lands, and from what we've seen so far across our members, this part is worth the wait.\n\nWe'll be in touch the moment your results are ready.\n\nIf you have any questions, reply to this email. A real person reads it.\n\nThe TMRW Team",sms:"TMRW: Your results are taking a little longer than usual. We've sent you an email explaining why. We're on it."},
      {id:"DZ-MANUAL",trigger:"sample_received + 28d, results not ready, or member expresses frustration",t:"Clinician Personal Outreach (+28d)",sub:"N/A - personal message",from:"Clinician",ch:"Email or Call",body:"[MANUAL] Day 28 or member expresses frustration.\n\nNo template. No automated copy. The clinician sends a personal email or calls the member directly. A task is created in HubSpot when results pass day 28 without the ready flag, or when a member replies to any earlier email expressing frustration."},
      {id:"3.11",t:"QC Fail at TMRW Office",sub:"We need to send you a new kit",from:"The TMRW Team",ch:"Email + SMS",body:"Hi [first name],\n\nYour sample has made it back to us, but it didn't pass our quality checks this time around. It doesn't happen often, but occasionally a sample arrives a little too light, a little too diluted, or just not giving our lab the DNA signal it needs to run the full analysis.\n\nThis isn't something you did wrong. Our quality bar is high because your results matter too much to get wrong.\n\nThe good news is we've got you covered. A fresh kit is on its way to you this week, on us. When it arrives, follow the video guide and the steps in the booklet. It only takes a few minutes, and should give the lab exactly what it needs.\n\nWe want to get this right for you as quickly as possible. If you have any questions, or if anything feels unclear, reply to this email. A real person reads it.\n\nThe TMRW Team",sms:"TMRW: Your sample didn't pass our quality check. Not your fault. A free replacement kit is on its way. Check your email for details."},
      {id:"4.2",trigger:"qc_fail_lab. Immediate.",t:"QC Fail at Lab",sub:"We need to talk to you about your sample",from:"The TMRW Team",ch:"Email + SMS + Phone call",body:"Hi [first name],\n\nWe need to share something difficult with you.\n\nYour sample, which has been at the lab for the past few weeks, didn't meet the quality standards required for full analysis. This means we need to collect a new sample to get you the results you deserve.\n\nWe understand what this means. You've been patient. You've waited. And this is not the update you were hoping for.\n\nThis is what we're doing about it.\n\nA replacement kit has been shipped to you today, on us. We've also flagged your replacement sample as a priority with the lab, so it will be processed ahead of the standard queue once it arrives.\n\nWhen the kit gets to you, follow the video guide and booklet. It only takes a few minutes.\n\nWhile we get this sorted, your clinical team has been heads down reviewing your Health Story and preparing for your results. We're really excited about the way it's coming together for you, and none of that work is lost.\n\nIf you want to talk, reply to this email. A real person reads it.\n\nThe TMRW Team",sms:"TMRW: We need to talk to you about your sample. Please check your email. A replacement is already on its way and we're making this right."},
    ]},
    {name:"Dashboard Unlock (4 emails)",tag:"tegan",emails:[
      {id:"DU-1",trigger:"Clinical analysis complete, dashboard unlocked. Immediate.",t:"Dashboard Is Live",sub:"Your TMRW Dashboard is live",from:"TMRW Health",ch:"Email + SMS",body:"Hi {{first_name}},\n\nYour clinical analysis is complete and your TMRW Dashboard is live.\n\nLog in at app.startmytomorrow.com using your email address. You'll receive a 6-digit code as your password.\n\nInside you'll find your biological age clocks, your personalised health goals, and your Better TMRW Plan. Your plan is built across six areas of your health: Think, Eat, Move, Rest, Supplement, and Treat. Every recommendation comes from your data.\n\nYou'll also be receiving your Precision Pods. Your personalised supplement formula has been created based on your results, and your first order will be on its way. You'll find the details in Your Shop.\n\nThere's a lot in there. Take your time with it.\n\n[VIEW MY DASHBOARD]\n\nIf you'd like to go through your results with someone, you can book an Insights Call with your clinical team here: {{booking_link}}\n\nTMRW Health",sms:"Hey, it's TMRW. Your dashboard is live at app.startmytomorrow.com. Your results, your Better TMRW Plan, and your Precision Pods are all ready. Have a look when you get a chance."},
      {id:"DU-2",trigger:"Dashboard unlocked + 48h, member hasn't logged in",t:"Haven't Logged In (+48h)",sub:"Have you seen your biological clocks?",from:"TMRW Health",ch:"Email",body:"Hi {{first_name}},\n\nWe wanted to point you to one thing in your dashboard in particular.\n\nYour Biological Clocks show how your body is ageing at a cellular level compared to your actual age. It's usually the first thing members want to talk about, and it's a good place to start.\n\nFrom there, your Better TMRW Plan breaks everything down across Think, Eat, Move, Rest, Supplement, and Treat. Each one is built around what your results show.\n\nLog in at app.startmytomorrow.com and have a look.\n\n[VIEW MY DASHBOARD]\n\nIf you'd rather talk through your results first, you can book an Insights Call here: {{booking_link}}\n\nTMRW Health"},
      {id:"DU-3",trigger:"Dashboard unlocked + 8d, member hasn't logged in",t:"Name the Friction (+8d)",sub:"Quick question",from:"TMRW Health",ch:"Email + SMS",body:"Hi {{first_name}},\n\nWe wanted to reach out one more time.\n\nYour dashboard and results have been ready for about a week now, and we haven't heard from you. That's completely fine. But we also know that sometimes the reason people don't log in isn't because they're too busy. Sometimes it's because the dashboard feels like a lot to take in, or you're not sure where to start, or you just haven't got around to it.\n\nIf any of that sounds familiar, your clinical team is here. You can book an Insights Call and we'll go through everything together. You don't need to have looked at anything first. We start wherever you are.\n\n{{booking_link}}\n\nAnd if something else is going on, or you just have a question, hit reply. We're here.\n\nTMRW Health",sms:"Hey, it's TMRW. Your dashboard has been live for about a week. Your results and plan are ready whenever you are: app.startmytomorrow.com"},
      {id:"DU-4",trigger:"[MANUAL] Dashboard unlocked + 10d, member hasn't logged in",t:"Clinician Manual Outreach (+10d)",sub:"N/A - personal message",from:"Clinician",ch:"Email/Call/SMS",body:"[MANUAL] Day 10. Not automated. Not templated.\n\nSystem notifies the assigned clinician via Oracle task and/or Slack. They reach out personally. The value is that it feels different from the automated sequence."},
    ]},
    {name:"Customised Pods (5 emails)",tag:"tegan",emails:[
      {id:"CP-1.0",trigger:"Health Story completed, pod formula prescribed. Immediate.",t:"Order Confirmed",sub:"Your first pod formula is being created",from:"The TMRW Team",ch:"Email + SMS",body:"Hi {{customer.first_name}},\n\nYour Customised Pod formula is being created.\n\nYour clinical team has reviewed your Health Story and is building your first formula from it. That's 30 clinically selected ingredients based on your profile, your goals, and your medical history. It's checked by your clinical team and compounded under the supervision of a licensed pharmacist.\n\nThis is the first version of your formula. As your blood results and epigenetic data come in over the coming weeks, it gets more precise. 30 ingredients becomes 70, then 107+. Your pods evolve as your data deepens.\n\nWe'll send tracking when they ship.\n\nThe TMRW Team",sms:"Hey, it's TMRW. Your Customised Pod formula is being created. 30 ingredients built from your Health Story. We'll send tracking when they ship."},
      {id:"CP-1.1",trigger:"Pod order sent to pharmacy. Immediate.",t:"With Pharmacy",sub:"Your pods are with our pharmacy team",from:"The TMRW Team",ch:"Email",body:"Hi {{customer.first_name}},\n\nYour Customised Pod order is now with our pharmacy team.\n\nA licensed compounding pharmacist is reviewing your formulation for accuracy and safety. Once approved, your pods are compounded under their supervision, then packed and dispatched. Usually within 48 to 72 hours.\n\nWe'll send tracking as soon as they ship.\n\nThe TMRW Team"},
      {id:"CP-1.2",trigger:"Pod order shipped. Immediate.",t:"Shipped",sub:"Your Customised Pods have shipped",from:"The TMRW Team",ch:"Email",body:"Hi {{customer.first_name}},\n\nYour Customised Pods are on their way.\n\nTrack your delivery here: {{Tracking Link}}\n\nWhen they arrive, we'll send you everything you need to know about taking them, including a video walkthrough.\n\nThe TMRW Team"},
      {id:"CP-1.3",trigger:"Pod order delivered (carrier confirmation). Immediate.",t:"Delivered",sub:"Your Customised Pods have arrived",from:"The TMRW Team",ch:"Email + SMS",body:"Hi {{customer.first_name}},\n\nYour Customised Pods are here. 30 ingredients, built from your Health Story, reviewed by your clinical team, and now in your hands.\n\nThis is the first version of your formula. When your blood results come in, it upgrades to your Personalised Pods. And when your full epigenetic data arrives, it evolves into your Precision Pods. The more data we have, the more precise it gets.\n\nBefore you get started, here's everything you need to know about taking them.\n\n{{Video: How to take your pods}}\n\nHow to take your pods (one pod per day): Tear off the seal and create a small hollow on your tongue. Pour a small amount of the granules in, sip water gently, tilt your head slightly back, and swallow. Repeat until the full serving is finished.\n\nTips: Don't try to swallow the whole serving at once, take it gradually. If you'd prefer an easier option, sprinkle onto plain yoghurt and swallow without chewing.\n\nStorage: Store below 25\u00b0C. Don't use a pod if the seal is broken.\n\nIf you notice any side effects or anything feels off, just hit reply and let us know.\n\nThe TMRW Team",sms:"Hey, it's TMRW. Your Customised Pods have arrived. Check your email for a video on how to take them."},
      {id:"CP-1.4",trigger:"Pod delivered + 14d",t:"2-Week Check-in",sub:"How are the pods going?",from:"Your TMRW Clinical Team",ch:"Email",body:"Hi {{customer.first_name}},\n\nYou're about two weeks into your Customised Pods. This is the point where we like to check in.\n\nSome people notice changes in energy, sleep, or digestion early. Some notice shifts in focus or mood. Some don't notice much yet. All of that is useful information, and none of it is wrong.\n\nWe're interested in the subtle things as much as the obvious ones. The way you're waking up, how your energy holds through the afternoon, whether your gut feels any different.\n\nJust hit reply and let us know how you're going. Your feedback goes directly to your clinical team.\n\nYour TMRW Clinical Team"},
    ]},
    {name:"Personalised Pods (3 emails)",tag:"tegan",emails:[
      {id:"PP-1.0",trigger:"Blood results received, formula upgraded. Immediate.",t:"Upgrade Notification",sub:"Your pod formula just got more precise",from:"The TMRW Team",ch:"Email + SMS",body:"Hi {{customer.first_name}},\n\nYour blood test results are in, and your pod formula is evolving.\n\nYour Customised Pods were built from your Health Story. Now that your blood panel is in, your clinical team is refining your formula into your Personalised Pods. That's 70 ingredients, tailored to what your biomarkers actually show. The things your blood tells us that your Health Story couldn't.\n\nThey'll ship once the formulation is complete. We'll send tracking when they're on the way.\n\nOne more tier to go. When your full epigenetic data arrives, your formula evolves again into your Precision Pods, compounded from 107+ ingredients. That's the complete picture.\n\nThe TMRW Team",sms:"Hey, it's TMRW. Your blood results are in and your pod formula is upgrading. Personalised Pods, 70 ingredients refined by your biomarkers. We'll send tracking when they ship."},
      {id:"PP-1.1",trigger:"Personalised Pod shipped. Immediate.",t:"Shipped",sub:"Your Personalised Pods have shipped",from:"The TMRW Team",ch:"Email",body:"Hi {{customer.first_name}},\n\nYour Personalised Pods are on their way. 70 ingredients, refined by your blood results.\n\nTrack your delivery here: {{Tracking Link}}\n\nSame pods, same routine, more precise formula. Take them the same way you've been taking your Customised Pods.\n\nIf you notice any changes as your body adjusts to the new formulation, hit reply and let us know.\n\nThe TMRW Team"},
      {id:"PP-1.2",trigger:"Personalised Pod delivered. Immediate.",t:"Delivered",sub:"Your Personalised Pods have arrived",from:"The TMRW Team",ch:"Email + SMS",body:"Hi {{customer.first_name}},\n\nYour Personalised Pods are here. 70 ingredients, refined by your blood results, reviewed by your clinical team.\n\nYour formula has evolved from the Customised Pods you've been taking. Same format, same routine, but now informed by what your biomarkers showed. The precision goes up from here. When your full epigenetic data arrives, your formula evolves one more time into your Precision Pods.\n\nHere's a refresher on how to take them.\n\n{{Video: How to take your pods}}\n\nHow to take your pods (one pod per day): Tear off the seal and create a small hollow on your tongue. Pour a small amount of the granules in, sip water gently, tilt your head slightly back, and swallow. Repeat.\n\nStorage: Store below 25\u00b0C. Don't use a pod if the seal is broken.\n\nIf you notice any side effects, just hit reply.\n\nThe TMRW Team",sms:"Hey, it's TMRW. Your Personalised Pods have arrived. Check your email for a video on how to take them."},
    ]},
    {name:"Precision Pods (6 emails)",tag:"tegan",emails:[
      {id:"XP-1.0",trigger:"Epigenetic results received, formula upgraded. Immediate.",t:"Upgrade Notification",sub:"Your formula just reached its final form",from:"The TMRW Team",ch:"Email + SMS",body:"Hi {{customer.first_name}},\n\nYour full epigenetic results are in. This is the moment your formula reaches its final form.\n\nYour clinical team is now compounding your Precision Pods. That's 107+ ingredients drawn from your complete biological profile: your Health Story, your blood results, and your full epigenetic data. 1,700+ data points, translated into one daily pod.\n\nYour Customised Pods were the starting point. Your Personalised Pods refined it. This is the complete picture. And it keeps getting sharper. Every time you retest (4 times a year), your formula is reformulated based on what's changed.\n\nWe'll send tracking when they ship.\n\nThe TMRW Team",sms:"Hey, it's TMRW. Your full epigenetic results are in. Your Precision Pods are being compounded. 107+ ingredients from your complete biological profile. We'll send tracking when they ship."},
      {id:"XP-1.1",trigger:"Precision Pod order sent to pharmacy. Immediate.",t:"With Pharmacy",sub:"Your Precision Pods are with our pharmacy team",from:"The TMRW Team",ch:"Email",body:"Hi {{customer.first_name}},\n\nYour Precision Pod order is now with our pharmacy team.\n\nA licensed compounding pharmacist is reviewing your formulation for accuracy and safety. Once approved, your pods are compounded under their supervision, then packed and dispatched. Usually within 48 to 72 hours.\n\nThis is the part where your biology becomes something you can hold in your hand.\n\nWe'll send tracking as soon as they ship.\n\nThe TMRW Team"},
      {id:"XP-1.2",trigger:"Precision Pod shipped. Immediate.",t:"Shipped",sub:"Your Precision Pods have shipped",from:"The TMRW Team",ch:"Email",body:"Hi {{customer.first_name}},\n\nYour Precision Pods are on their way.\n\nTrack your delivery here: {{Tracking Link}}\n\nWhen they arrive, we'll send you everything you need to know about taking them, including a video walkthrough.\n\nThe TMRW Team"},
      {id:"XP-1.3",trigger:"Precision Pod delivered. Immediate.",t:"Delivered",sub:"Your Precision Pods have arrived",from:"The TMRW Team",ch:"Email + SMS",body:"Hi {{customer.first_name}},\n\nYour Precision Pods are here. 107+ ingredients, built from your complete biological profile, reviewed by your clinical team, and now in your hands.\n\nBefore you get started, here's everything you need to know about taking them.\n\n{{Video: How to take your pods}}\n\nHow to take your pods (one pod per day): Tear off the seal and create a small hollow on your tongue. Pour a small amount of the granules in, sip water gently, tilt your head slightly back, and swallow. Repeat.\n\nTips: Don't try to swallow the whole serving at once. If you'd prefer an easier option, sprinkle onto plain yoghurt and swallow without chewing.\n\nStorage: Store below 25\u00b0C. Don't use a pod if the seal is broken.\n\nIf you notice any side effects, just hit reply.\n\nThe TMRW Team",sms:"Hey, it's TMRW. Your Precision Pods have arrived. Check your email for a video on how to take them."},
      {id:"XP-1.4",trigger:"Precision Pod delivered + 14d",t:"2-Week Check-in",sub:"How are the pods going?",from:"Your TMRW Clinical Team",ch:"Email",body:"Hi {{customer.first_name}},\n\nYou're about two weeks into your Precision Pods. Your clinical team built that formulation around your specific biology, and this is the point where we like to check in.\n\nSome people notice changes in energy, sleep, or digestion early. Some notice shifts in focus or mood. Some don't notice much yet. All of that is useful information, and none of it is wrong.\n\nWe're interested in the subtle things as much as the obvious ones. The way you're waking up, how your energy holds through the afternoon, whether your gut feels any different. These are the signals your clinical team uses to understand how your body is responding and whether anything in your formulation needs adjusting.\n\nIf something feels different, tell us. If something feels off, we want to know that too. And if nothing has changed yet, that's still worth sharing.\n\nJust hit reply and let us know how you're going. Your feedback goes directly to your clinical team.\n\nYour TMRW Clinical Team"},
      {id:"XP-1.5",trigger:"3 days before next pod renewal payment",t:"Renewal Reminder",sub:"Your next Precision Pods are on the way",from:"The TMRW Team",ch:"Email + SMS",body:"Hi {{customer.first_name}},\n\nYour next set of Precision Pods is almost ready to begin.\n\nIn 3 days, your payment will process and your formulation moves to our pharmacy team for review, then into preparation and dispatch. Same precision, personalised to your biology, reviewed by your clinical team.\n\nIf you need to update your delivery details, pause, or make any changes, you can manage everything in your Dashboard.\n\nThe TMRW Team",sms:"Hey, it's TMRW. Your next Precision Pods begin formulation in 3 days. Need to make changes? {{Dashboard Link}}"},
    ]},
    {name:"Insights Call (6 emails)",tag:"tegan",emails:[
      {id:"5.1",trigger:"Member books Insights Call. Immediate.",t:"Booking Confirmation",sub:"Your Insights Call is booked",preview:"Here's what to expect.",from:"The TMRW Team",ch:"Email",body:"Hey {{customer.first_name}},\n\nYour Insights Call is confirmed.\n\nDate: {{call_date}}\nTime: {{call_time}}\nDuration: 30 to 45 minutes\nJoin here: {{call_link}}\n\nYour clinical team will walk through your results, what they mean for you, and your Better TMRW Plan. They'll cover what's working well, what needs attention, and your next steps. If you have questions about advanced testing or anything else, this is the time to ask.\n\nCome with whatever's on your mind. That's what the call is for.\n\nThe TMRW Team"},
      {id:"5.2",trigger:"Day before scheduled Insights Call",t:"Reminder (Day Before)",sub:"Your Insights Call is tomorrow",preview:"Here's your join link.",from:"The TMRW Team",ch:"Email",body:"Hey {{customer.first_name}},\n\nQuick reminder that your Insights Call is tomorrow at {{call_time}}.\n\nYour clinical team will walk you through your results and your Better TMRW Plan. If you've got specific questions, bring them along.\n\nJoin here: {{call_link}}\n\nThe TMRW Team"},

      {id:"5.4",trigger:"Member reschedules. Immediate.",t:"Reschedule",sub:"Your Insights Call has been rescheduled",preview:"Here are your new details.",from:"The TMRW Team",ch:"Email",body:"Hey {{customer.first_name}},\n\nYour Insights Call has been rescheduled.\n\nNew date: {{call_date}}\nNew time: {{call_time}}\nJoin here: {{call_link}}\n\nYour clinical team will be ready for you.\n\nThe TMRW Team"},
      {id:"5.5",trigger:"Call cancelled. Immediate.",t:"Cancellation",sub:"Your Insights Call was cancelled",preview:"You can rebook whenever you're ready.",from:"The TMRW Team",ch:"Email",body:"Hey {{customer.first_name}},\n\nYour Insights Call has been cancelled. Your results and your Better TMRW Plan are still ready in your dashboard whenever you want to look through them.\n\nIf you'd like to rebook, you can do that here:\n\n[REBOOK MY INSIGHTS CALL]\n\nNo rush. Your clinical team is here when you're ready.\n\nThe TMRW Team"},
      {id:"5.6",trigger:"+1h after scheduled call, member did not join",t:"No-Show",sub:"We missed you today",preview:"No worries. Your results are ready whenever you are.",from:"The TMRW Team",ch:"Email",body:"Hey {{customer.first_name}},\n\nLooks like we missed you on your Insights Call today. No worries at all.\n\nYour results and your Better TMRW Plan are live in your dashboard. You can explore them anytime at app.startmytomorrow.com.\n\nIf you'd like to rebook the call:\n\n[REBOOK MY INSIGHTS CALL]\n\nAnd if you'd rather go through your dashboard on your own, that's completely fine too. Your clinical team is working on your plan either way.\n\nThe TMRW Team"},

function renderNav(){var tabs=[{k:"emails",l:"Email Content"},{k:"status",l:"Status"}];document.getElementById("nav").innerHTML=tabs.map(function(t){return'<a class="'+(tab===t.k?"act":"")+'" onclick="tab=\''+t.k+'\';render()">'+t.l+"</a>";}).join("");}
function renderEmails(){var h="";flows.forEach(function(fl,fi){var isOpen=!!flowOpen[fi];h+='<div class="flow-section"><div class="flow-header '+(isOpen?"open":"")+'" onclick="flowOpen['+fi+"]=!flowOpen["+fi+"];render()\">";h+='<span class="chv '+(isOpen?"o":"")+'">&#9654;</span><h3>'+esc(fl.name)+"</h3>";h+='<span class="flow-count">'+fl.emails.length+" emails</span></div>";if(isOpen){h+='<div class="flow-body">';fl.emails.forEach(function(em){var oid=em.id;var isEO=!!emailOpen[oid];var st=statusData[oid]||"";h+='<div class="email-card"><div class="email-hdr" onclick="emailOpen[\''+oid+"']=!emailOpen['"+oid+"'];render()\">";h+='<span class="chv '+(isEO?"o":"")+'">&#9654;</span><span class="eid">'+esc(em.id)+'</span><span class="etitle">'+esc(em.t)+"</span>";if(st)h+='<span class="pill '+pc(st)+'">'+st+"</span>";if(em.trigger)h+='<span style="font-size:9px;color:#c97b5a;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+esc(em.trigger)+'">'+esc(em.trigger)+"</span>";h+='<span class="ech">'+esc(em.ch||"")+"</span></div>";if(isEO){h+='<div class="email-detail"><div class="meta-grid">';h+='<div><div class="meta-label">Subject</div><div class="meta-val">'+esc(em.sub||"")+"</div></div>";h+='<div><div class="meta-label">From</div><div class="meta-val">'+esc(em.from||"")+"</div></div>";if(em.preview)h+='<div><div class="meta-label">Preview Text</div><div class="meta-val italic">'+esc(em.preview)+"</div></div>";h+='<div><div class="meta-label">Channel</div><div class="meta-val">'+esc(em.ch||"")+"</div></div>";if(em.trigger)h+='<div style="grid-column:1/-1"><div class="meta-label">Trigger</div><div class="meta-val" style="color:#c97b5a;font-weight:500">'+esc(em.trigger)+"</div></div>";h+="</div>";h+='<div class="copy-box"><div class="copy-label">Email Copy</div><div class="copy-text">'+esc(em.body||"No copy documented yet.")+"</div></div>";if(em.sms)h+='<div class="sms-box"><div class="sms-label">SMS</div><div class="sms-text">'+esc(em.sms)+"</div></div>";var hasCmt=comments[oid];var isEditing=editingComment===oid;if(hasCmt&&!isEditing){h+='<div class="comment-box"><div class="comment-label">Comment</div><div class="comment-text">'+esc(comments[oid])+'</div><div class="btn-row"><button class="btn-cancel" onclick="editingComment=\''+oid+"';render()\">Edit</button></div></div>";}if(!hasCmt&&!isEditing)h+='<button class="btn-add-comment" onclick="editingComment=\''+oid+"';render()\">+ Add comment</button>";if(isEditing){h+='<div class="comment-input"><textarea id="ci-'+oid.replace(/[^a-z0-9]/gi,"")+"\" placeholder=\"Add a comment...\">"+(hasCmt?esc(comments[oid]):"")+"</textarea>";h+='<div class="btn-row"><button class="btn-save" onclick="saveComment(\''+oid+"',document.getElementById('ci-"+oid.replace(/[^a-z0-9]/gi,"")+"').value)\">Save</button>";if(hasCmt)h+='<button class="btn-del" onclick="saveComment(\''+oid+"','');\">Delete</button>";h+='<button class="btn-cancel" onclick="editingComment=null;render()">Cancel</button></div></div>';}h+="</div>";}h+="</div>";});h+="</div>";}h+="</div>";});return h;}
function renderStatus(){var total=0,live=0,approved=0,todo=0,review=0,blocked=0;flows.forEach(function(fl){fl.emails.forEach(function(em){total++;var st=statusData[em.id]||"";if(st==="Live")live++;else if(st==="Approved")approved++;else if(st==="To Do")todo++;else if(st==="To Review")review++;else if(st==="Blocked")blocked++;});});var h='<div class="summary-bar">';[{n:total,l:"Total",c:"#1a1a1a"},{n:live,l:"Live",c:"#059669"},{n:approved,l:"Approved",c:"#2563eb"},{n:todo,l:"To Do",c:"#6366f1"},{n:review,l:"Review",c:"#ca8a04"},{n:blocked,l:"Blocked",c:"#dc2626"}].forEach(function(s){h+='<div class="summary-item"><div class="sn" style="color:'+s.c+'">'+s.n+'</div><div class="sl">'+s.l+"</div></div>";});h+="</div>";h+='<div class="filters"><span style="font-size:11px;color:#bbb;font-weight:600;padding:6px 0">Filter:</span>';[["all","All"],["Live","Live"],["Approved","Approved"],["To Do","To Do"],["To Review","Review"],["Blocked","Blocked"],["Cut","Cut"],["noted","With notes"],["unset","No status"]].forEach(function(f){h+='<span class="fb '+(statusFilter===f[0]?"a":"")+'" onclick="statusFilter=\''+f[0]+"';render()\">"+f[1]+"</span>";});h+="</div>";flows.forEach(function(fl,fi){var filtered=fl.emails.filter(function(em){var st=statusData[em.id]||"";if(statusFilter==="all")return true;if(statusFilter==="noted")return!!notes[em.id];if(statusFilter==="unset")return!st;return st===statusFilter;});if(!filtered.length)return;var isOpen=stageOpen[fi]!==false;h+='<div class="status-section"><div class="status-header" onclick="stageOpen['+fi+"]=stageOpen["+fi+"]===false?true:false;render()\">";h+='<span class="chv '+(isOpen?"o":"")+'">&#9654;</span><h3>'+esc(fl.name)+'</h3><span class="flow-count">'+filtered.length+" emails</span></div>";if(isOpen){h+='<div class="status-hdr"><div>ID</div><div>Title</div><div>Channel</div><div>Status</div><div></div></div>';filtered.forEach(function(em){var st=statusData[em.id]||"";var hasNote=notes[em.id];var isEditing=editingNote===em.id;h+='<div class="status-row"><div class="sid">'+esc(em.id)+'</div><div class="stitle">'+esc(em.t)+'</div><div style="font-size:10px;color:#999">'+esc(em.ch||"")+'</div><div><select class="status-sel" onchange="saveStatus(\''+em.id+"',this.value)\" style=\"border-color:"+(st?"#c97b5a":"#e8e4df")+'"><option value="">\\u2014</option>';STATUSES.forEach(function(s){h+='<option value="'+s+'"'+(st===s?" selected":"")+">"+s+"</option>";});h+='</select></div><div class="note-btn" onclick="editingNote=editingNote===\''+em.id+"'?null:'"+em.id+"';render()\" title=\""+(hasNote?"Edit note":"Add note")+"\">"+(hasNote?"&#9998;":"&#43;")+"</div></div>";if(hasNote&&!isEditing)h+='<div class="note-text">'+esc(notes[em.id])+"</div>";if(isEditing){h+='<div class="note-input"><input id="ni-'+em.id.replace(/[^a-z0-9]/gi,"")+'" value="'+esc(notes[em.id]||"")+'" placeholder="Add a note..." onkeydown="if(event.key===\'Enter\')saveNote(\''+em.id+"',this.value)\"><button class=\"btn-save\" onclick=\"saveNote('"+em.id+"',document.getElementById('ni-"+em.id.replace(/[^a-z0-9]/gi,"")+"').value)\">Save</button>";if(hasNote)h+='<button class="btn-del" onclick="saveNote(\''+em.id+"','');\">Del</button>";h+="</div>";}});}h+="</div>";});return h;}
function render(){renderNav();var c="";if(tab==="emails")c=renderEmails();else if(tab==="status")c=renderStatus();document.getElementById("content").innerHTML=c;}
render();

</script>
